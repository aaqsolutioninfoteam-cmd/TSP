*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a1a2e;max-width:500px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
:root{--primary:#1a6b3c;--dark:#0d4a25;--red:#dc3545;--orange:#ff9800;--success:#28a745;--light:#f5f7fa;--dark-text:#1a1a2e;--gray:#6c757d;--border:#e9ecef;--white:#fff;--radius:14px;}

.sidebar-header .info h3{font-size:14px;font-weight:600;}
.sidebar-header .info p{font-size:11px;opacity:.8;}

.sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;color:var(--dark-text);text-decoration:none;font-size:14px;border-bottom:1px solid var(--border);transition:background .2s;}
.sidebar nav a:hover,.sidebar nav a.active{background:#e8f5e9;color:var(--primary);font-weight:600;}
.sidebar nav a i{width:20px;text-align:center;color:var(--primary);}

.topbar{position:sticky;top:0;background:var(--primary);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:100;}
.topbar .menu-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
.topbar h1{font-size:17px;font-weight:600;flex:1;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;}
.stat-box{background:var(--white);border-radius:var(--radius);padding:10px 6px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stat-box .num{font-size:20px;font-weight:700;}
.stat-box .lbl{font-size:10px;color:var(--gray);margin-top:2px;}
.stat-box:nth-child(1) .num{color:var(--primary);}
.stat-box:nth-child(2) .num{color:var(--success);}
.stat-box:nth-child(3) .num{color:var(--red);}
.stat-box:nth-child(4) .num{color:var(--orange);}

.search-box{padding:0 16px 8px;}
.search-box input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--white);outline:none;}
.search-box{position:relative;}
.search-box i{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:14px;}

.filter-tabs{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto;}
.filter-tabs button{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--white);font-size:12px;cursor:pointer;white-space:nowrap;font-weight:500;color:var(--gray);}
.filter-tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary);}

.persons-list{padding:0 16px 100px;}
.person-card{background:var(--white);border-radius:var(--radius);padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .2s;}
.person-card:active{box-shadow:0 2px 8px rgba(0,0,0,.12);}
.person-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.person-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;}
.person-photo img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
.person-info{flex:1;min-width:0;}
.person-info .pid{font-size:10px;color:var(--gray);}
.person-info .pname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.person-meta{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:11px;color:var(--gray);margin-bottom:6px;}
.person-meta i{margin-right:3px;color:var(--primary);}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
.status-active{background:#e8f5e9;color:var(--success);}
.status-inactive{background:#ffeaea;color:var(--red);}
.status-hold{background:#fff3e0;color:var(--orange);}
.status-transferred{background:#e3f2fd;color:#1976d2;}
.status-left{background:#ffeaea;color:var(--red);}
.person-actions{display:flex;gap:6px;margin-top:8px;border-top:1px solid var(--border);padding-top:8px;}
.person-actions button{flex:1;padding:6px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;}
.btn-view{background:#e3f2fd;color:#1976d2;}
.btn-edit{background:#fff3e0;color:var(--orange);}
.btn-delete{background:#ffeaea;color:var(--red);}
.btn-status{background:#f3e5f5;color:#7b1fa2;}

.person-detail{display:none;margin-top:10px;padding-top:8px;border-top:1px dashed var(--border);font-size:12px;color:var(--gray);}
.person-detail.show{display:block;}
.detail-row{display:flex;justify-content:space-between;padding:3px 0;}
.detail-row .dlabel{font-weight:500;color:var(--dark-text);}

.empty-state{text-align:center;padding:40px 16px;color:var(--gray);}
.empty-state i{font-size:48px;color:var(--border);margin-bottom:12px;}
.empty-state p{font-size:14px;}

.fab{position:fixed;bottom:70px;right:calc(50% - 230px);width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(26,107,60,.4);z-index:50;display:flex;align-items:center;justify-content:center;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;}
.bottom-nav a{flex:1;text-align:center;padding:8px 4px;text-decoration:none;color:var(--gray);font-size:10px;}
.bottom-nav a i{display:block;font-size:18px;margin-bottom:2px;}
.bottom-nav a.active{color:var(--primary);font-weight:600;}

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);width:100%;max-width:500px;max-height:92vh;border-radius:16px 16px 0 0;overflow-y:auto;animation:slideUp .3s ease;}

.modal-header{position:sticky;top:0;background:var(--primary);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:1;}
.modal-header h2{font-size:16px;font-weight:600;}
.modal-header button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
.modal-body{padding:16px;padding-bottom:30px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--dark-text);margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--white);font-family:inherit;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);}
.form-group textarea{resize:vertical;min-height:60px;}
.form-group .required::after{content:' *';color:var(--red);}
.photo-upload{text-align:center;margin-bottom:14px;}
.photo-upload .preview{width:80px;height:80px;border-radius:50%;background:var(--border);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.photo-upload .preview img{width:100%;height:100%;object-fit:cover;}
.photo-upload .preview i{font-size:28px;color:var(--gray);}
.photo-upload input[type=file]{display:none;}
.photo-upload label{display:inline-block;padding:6px 16px;background:var(--primary);color:#fff;border-radius:20px;font-size:12px;cursor:pointer;}
.btn-row{display:flex;gap:10px;margin-top:16px;}
.btn-row button{flex:1;padding:12px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;}
.btn-save{background:var(--primary);color:#fff;}
.btn-cancel{background:var(--border);color:var(--dark-text);}
.btn-delete-confirm{background:var(--red);color:#fff;}

.loading{text-align:center;padding:20px;color:var(--gray);font-size:13px;}
.loading i{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.status-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:2500;display:none;align-items:center;justify-content:center;}
.status-modal.show{display:flex;}
.status-modal-content{background:var(--white);width:90%;max-width:360px;border-radius:var(--radius);padding:20px;text-align:center;}
.status-modal-content h3{font-size:16px;margin-bottom:12px;}
.status-options{display:flex;flex-direction:column;gap:8px;margin:12px 0;}
.status-options button{padding:10px;border:2px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;background:var(--white);text-align:left;}
.status-options button.selected{border-color:var(--primary);background:#e8f5e9;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;z-index:3000;animation:fadeInOut 3s;white-space:nowrap;}
.toast.success{background:var(--success);}
.toast.error{background:var(--red);}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200}
.sidebar-overlay.active{display:block}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--white);z-index:300;transition:left 0.3s ease;overflow-y:auto;border-radius:0 var(--radius) var(--radius) 0;box-shadow:2px 0 10px rgba(0,0,0,0.1)}
.sidebar.open{left:0}
.sidebar-header{background:var(--primary);color:var(--white);padding:20px 16px;border-radius:0 var(--radius) 0 0}
.sidebar-header h2{font-size:16px;margin-bottom:4px}
.sidebar-header p{font-size:12px;opacity:0.8}
.sidebar-header .role-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:20px;font-size:11px;margin-top:6px;text-transform:capitalize}
.sidebar-menu{padding:10px 0}
.sidebar-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--dark-text);text-decoration:none;font-size:14px;transition:background 0.2s}
.sidebar-menu a:hover,.sidebar-menu a.active{background:var(--light);color:var(--primary);font-weight:600}
.sidebar-menu a.active{border-right:3px solid var(--primary)}
.sidebar-menu a i{width:22px;text-align:center;font-size:16px;flex-shrink:0}
.sidebar-menu .logout-btn{color:var(--red);border-top:1px solid var(--border);margin-top:6px}
</style>
</head>

function showToast(msg,type){

function getInitials(name){
  if(!name)return'?';
  const parts=name.trim().split(/\s+/);
  if(parts.length>=2)return (parts[0][0]+parts[1][0]).toUpperCase();
  return parts[0].substring(0,2).toUpperCase();
}

function resizeImage(file,maxW,maxH,cb){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      if(w>maxW){h=h*maxW/w;w=maxW;}
      if(h>maxH){w=w*maxH/h;h=maxH;}
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.7));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function handlePhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  if(file.size>2*1024*1024){showToast('Image must be under 2MB','error');return;}
  resizeImage(file,200,200,function(dataUrl){
    photoBase64=dataUrl;
    document.getElementById('photoPreview').innerHTML='<img src="'+dataUrl+'">';
  });
}

    const snap=await buildQuery().get();
    allPersons=[];

    allPersons.sort((a,b)=>(a.personId||'').localeCompare(b.personId||''));

function updateStats(){
  let total=allPersons.length;
  let active=allPersons.filter(p=>p.status==='Active').length;
  let inactive=allPersons.filter(p=>p.status==='Inactive'||p.status==='Left'||p.status==='Hold').length;
  let transferred=allPersons.filter(p=>p.status==='Transferred').length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statActive').textContent=active;
  document.getElementById('statInactive').textContent=inactive;
  document.getElementById('statTransferred').textContent=transferred;

function filterPersons(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  filteredPersons=allPersons.filter(p=>{
    if(currentFilter!=='all'&&p.status!==currentFilter)return false;
    if(!q)return true;
    return (p.name||'').toLowerCase().includes(q)||(p.phone||'').includes(q)||(p.personId||'').toLowerCase().includes(q)||(p.fatherName||'').toLowerCase().includes(q);
  });
  renderList();
}

async function getNextPersonId(){
  try{
    const snap=await db.collection('persons').orderBy('personId','desc').limit(1).get();
    if(snap.empty)return 'P0001';
    const last=snap.docs[0].data().personId||'P0000';
    const num=parseInt(last.replace('P',''))+1;
    return 'P'+String(num).padStart(4,'0');
  }catch(e){
    const snap2=await db.collection('persons').get();
    let maxN=0;
    snap2.forEach(doc=>{
      const pid=doc.data().personId||'';
      const n=parseInt(pid.replace('P',''));
      if(n>maxN)maxN=n;
    });
    return 'P'+String(maxN+1).padStart(4,'0');
  }
}

async function savePerson(){

  const phone=document.getElementById('phoneField').value.trim();
  const districtId=document.getElementById('districtField').value;
  const areaId=document.getElementById('areaField').value;

  if(!name){showToast('Name is required','error');return;}
  if(!phone||phone.length<10){showToast('Valid 10-digit phone required','error');return;}
  if(!districtId){showToast('District is required','error');return;}
  if(!areaId){showToast('Area is required','error');return;}

  const distDoc=allDistricts.find(d=>d.id===districtId);
  const areaDoc=allAreas.find(d=>d.id===areaId);
  const zhDoc=allZeliHalqas.find(d=>d.id===document.getElementById('zeliHalqaField').value);
  const deptDoc=allDepts.find(d=>d.id===document.getElementById('deptField').value);
  const desigDoc=allDesignations.find(d=>d.id===document.getElementById('desigField').value);
  const reportSel=document.getElementById('reportingField');
  const reportOpt=reportSel.options[reportSel.selectedIndex];
  const divId=document.getElementById('divisionField').value;

  const data={
    personId:document.getElementById('personIdField').value,
    name:name,
    fatherName:document.getElementById('fatherNameField').value.trim(),
    phone:phone,
    email:document.getElementById('emailField').value.trim(),
    photo:photoBase64,
    divisionId:divId||'',
    districtId:districtId,
    districtName:distDoc?(distDoc.name||distDoc.id):'',
    areaId:areaId,
    areaName:areaDoc?(areaDoc.name||areaDoc.id):'',
    zeliHalqaId:document.getElementById('zeliHalqaField').value,
    zeliHalqaName:zhDoc?(zhDoc.name||zhDoc.id):'',
    primaryDeptId:document.getElementById('deptField').value,
    primaryDeptName:deptDoc?(deptDoc.name||deptDoc.id):'',
    designationId:document.getElementById('desigField').value,
    designationName:desigDoc?(desigDoc.name||desigDoc.id):'',
    reportingToId:reportSel.value||'',
    reportingToName:(reportSel.value&&reportOpt)?reportOpt.textContent:'',
    joiningDate:document.getElementById('joinDateField').value,
    responsibilityStartDate:document.getElementById('respDateField').value,
    status:document.getElementById('statusField').value,
    remarks:document.getElementById('remarksField').value.trim(),
    createdAt:editingPersonId?(allPersons.find(p=>p.id===editingPersonId)||{}).createdAt||firebase.firestore.FieldValue.serverTimestamp():firebase.firestore.FieldValue.serverTimestamp()
  };

  const saveBtn=document.getElementById('saveBtn');
  saveBtn.disabled=true;
  saveBtn.textContent=editingPersonId?'Updating...':'Saving...';

  try{
    if(editingPersonId){
      await db.collection('persons').doc(editingPersonId).update(data);
      showToast('Person updated successfully','success');
    }else{
      data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('persons').add(data);
      showToast('Person added successfully','success');
    }
    closeModal();
    await loadPersons();
  }catch(e){
    console.error(e);
    showToast('Error saving: '+e.message,'error');
  }finally{
    saveBtn.disabled=false;
    saveBtn.textContent=editingPersonId?'Update':'Save';
  }
}

function openStatusModal(id){
  const p=allPersons.find(x=>x.id===id);
  if(!p)return;
  currentStatusPersonId=id;
  selectedNewStatus='';
  document.getElementById('statusPersonName').textContent=p.name+' ('+p.personId+')';
  document.querySelectorAll('.status-options button').forEach(b=>b.classList.remove('selected'));
  document.getElementById('statusModal').classList.add('show');
}

function selectStatus(s,btn){
  selectedNewStatus=s;
  document.querySelectorAll('.status-options button').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function closeStatusModal(){
  document.getElementById('statusModal').classList.remove('show');
  currentStatusPersonId=null;
  selectedNewStatus='';
}

async function confirmStatusChange(){
  if(!selectedNewStatus||!currentStatusPersonId){showToast('Select a status','error');return;}
  const p=allPersons.find(x=>x.id===currentStatusPersonId);
  const oldStatus=p?p.status:'';
  try{
    await db.collection('persons').doc(currentStatusPersonId).update({status:selectedNewStatus});
    await db.collection('person_history').add({
      personId:currentStatusPersonId,
      personName:p?p.name:'',
      oldStatus:oldStatus,
      newStatus:selectedNewStatus,
      changedBy:currentUser.name||currentUser.email,
      changedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('Status updated to '+selectedNewStatus,'success');
    closeStatusModal();
    await loadPersons();
  }catch(e){
    console.error(e);
    showToast('Error updating status','error');
  }
}

function openDeleteModal(id){
  const p=allPersons.find(x=>x.id===id);
  if(!p)return;
  deleteTargetId=id;
  document.getElementById('deletePersonName').textContent='Delete "'+p.name+'" ('+p.personId+')? This cannot be undone.';
  document.getElementById('deleteModal').classList.add('show');
}

function closeDeleteModal(){
  document.getElementById('deleteModal').classList.remove('show');
  deleteTargetId=null;
}

async function confirmDelete(){
  if(!deleteTargetId)return;
  try{
    await db.collection('persons').doc(deleteTargetId).delete();
    showToast('Person deleted','success');
    closeDeleteModal();
    await loadPersons();
  }catch(e){
    console.error(e);
    showToast('Error deleting','error');
  }
}

async function init(){
  await checkSystemAccess('persons');
  currentUser=requireAuth(['division_head','district_head','area_head']);
  if(!currentUser)return;

  userRole=currentUser.role||'';
  userDivision=currentUser.divisionId||currentUser.division||'';
  userDistrict=currentUser.districtId||currentUser.district||'';
  userArea=currentUser.areaId||currentUser.area||'';

  buildSidebar(currentUser);
  buildBottomNav(currentUser);
  await loadPersons();
}

init();


function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}
function buildSidebar(user){
  const nameEl=document.getElementById('sidebarName');
  const phoneEl=document.getElementById('sidebarPhone');
  const roleEl=document.getElementById('sidebarRole');
  const avatarEl=document.getElementById('avatarEl');
  if(nameEl)nameEl.textContent=user.name;
  if(phoneEl)phoneEl.textContent=user.phone||'-';
  if(roleEl)roleEl.textContent=user.role.replace(/_/g,' ');
  if(avatarEl)avatarEl.textContent=user.name.charAt(0).toUpperCase();
  const menu=menus[user.role]||[];
  const cont=document.getElementById('sidebarMenu');
  if(!cont)return;
  cont.innerHTML='';
  menu.forEach(m=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+m.icon+'"></i> '+m.label;
    if(m.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      closeSidebar();
      if(m.file==='logout'){localStorage.removeItem('ngoUser');window.location.href='index.html';return}
      if(m.file!=='dashboard.html')window.location.href=m.file;
    };
    if(m.icon==='fa-sign-out-alt')a.classList.add('logout-btn');
    cont.appendChild(a);
  });
}
function buildBottomNav(user){
  const nav=document.getElementById('bottomNav');
  if(!nav)return;
  nav.innerHTML='';
  const items=bottomNavs[user.role]||[];
  items.forEach(b=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+b.icon+'"></i><span>'+b.label+'</span>';
    if(b.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      if(b.file==='sidebar'){toggleSidebar();return}
      if(b.file!=='dashboard.html')window.location.href=b.file;
    };
    nav.appendChild(a);
  });
}
</script>
