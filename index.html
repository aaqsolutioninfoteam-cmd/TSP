<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Login - Tanzeem Structure Portal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
<style>
:root{--primary:#1a6b3c;--primary-dark:#0d4a25;--primary-light:#e8f5e9;--danger:#dc3545;--danger-dark:#a71d2a;--warning:#ff9800;--success:#28a745;--bg:#f0f2f5;--card:#fff;--text:#333;--text-light:#666;--border:#e0e0e0;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0d4a25 0%,#1a6b3c 50%,#2d8f4e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-container{width:100%;max-width:420px}
.login-card{background:#fff;border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:40px 30px;text-align:center}
.logo-icon{width:80px;height:80px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:36px;color:#fff;box-shadow:0 8px 25px rgba(26,107,60,0.4)}
.login-card h1{font-size:22px;font-weight:800;color:var(--primary-dark);margin-bottom:4px}
.subtitle{font-size:12px;color:var(--text-light);margin-bottom:8px;font-weight:500}
.developer{font-size:10px;color:var(--primary);font-weight:600;margin-bottom:25px;padding:4px 12px;background:var(--primary-light);border-radius:20px;display:inline-block}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;display:block}
.input-with-icon{position:relative}
.input-with-icon i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--primary);font-size:16px}
.input-with-icon input{width:100%;padding:14px 14px 14px 42px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;transition:all 0.3s;background:#f8f9fa}
.input-with-icon input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(26,107,60,0.1)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:inherit;margin-top:8px}
.login-btn:active{transform:scale(0.98)}
.error-msg{color:var(--danger);font-size:13px;margin-top:10px;display:none;font-weight:500}
.loading{display:none;text-align:center;padding:20px}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top:4px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--primary-dark);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;display:none;box-shadow:0 4px 15px rgba(0,0,0,0.2)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="login-container">
<div class="login-card">
<div class="logo-icon"><i class="fas fa-building"></i></div>
<h1>Tanzeem Structure Portal</h1>
<p class="subtitle">Department, Zimmedaran & Tanzeemi Structure Management System</p>
<span class="developer"><i class="fas fa-code"></i> A.A.Q. Solutions & Outsourcing</span>
<div id="loginForm">
<div class="form-group">
<label><i class="fas fa-phone"></i> Phone Number</label>
<div class="input-with-icon">
<i class="fas fa-mobile-alt"></i>
<input type="tel" id="phone" placeholder="Enter 10-digit phone" maxlength="10" inputmode="numeric">
</div>
</div>
<div class="form-group">
<label><i class="fas fa-lock"></i> Password</label>
<div class="input-with-icon">
<i class="fas fa-key"></i>
<input type="password" id="password" placeholder="Enter password">
</div>
</div>
<button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
<div class="error-msg" id="error"></div>
</div>
<div class="loading" id="loading">
<div class="spinner"></div>
<p>Logging in...</p>
</div>
</div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.appspot.com",messagingSenderId:"489310613218",appId:"1:489310613218:web:e44e61cf16d4b8c106729d"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

const AUTO_USERS=[
{phone:"7600263704",password:"252600",name:"Admin",role:"division_head",levelId:"1"},
{phone:"7383623373",password:"252600",name:"Head 2",role:"division_head",levelId:"1"}
];

async function createAutoUsers(){
for(const u of AUTO_USERS){
const q=await db.collection("users").where("phone","==",u.phone).get();
if(q.empty){
await db.collection("users").add({...u,active:true,createdBy:"system",createdAt:new Date().toISOString()});
}
}
}

function showToast(msg){
const t=document.getElementById("toast");
t.textContent=msg;
t.style.display="block";
setTimeout(()=>{t.style.display="none"},3000);
}

async function doLogin(){
const phone=document.getElementById("phone").value.trim();
const password=document.getElementById("password").value.trim();
const error=document.getElementById("error");
const loginForm=document.getElementById("loginForm");
const loading=document.getElementById("loading");

if(!phone||!password){error.textContent="Phone aur password dono dalen";error.style.display="block";return;}
if(phone.length!==10){error.textContent="Phone 10 digits ka hona chahiye";error.style.display="block";return;}

error.style.display="none";
loginForm.style.display="none";
loading.style.display="block";

try{
const email=phone+"@ngo-app.local";
await auth.signInWithEmailAndPassword(email,password);
const user=auth.currentUser;
if(user){
const udoc=await db.collection("users").where("phone","==",phone).get();
if(!udoc.empty){
const d=udoc.docs[0];
const userData={id:d.id,...d.data()};
localStorage.setItem("currentUser",JSON.stringify(userData));
window.location.href="dashboard.html";
return;
}
}
error.textContent="User nahi mila";
error.style.display="block";
loginForm.style.display="block";
loading.style.display="none";
}catch(e){
try{
const q=await db.collection("users").where("phone","==",phone).where("password","==",password).get();
if(!q.empty){
const d=q.docs[0];
const userData={id:d.id,...d.data()};
await auth.signOut().catch(()=>{});
localStorage.setItem("currentUser",JSON.stringify(userData));
window.location.href="dashboard.html";
}else{
error.textContent="Galat phone ya password";
error.style.display="block";
loginForm.style.display="block";
loading.style.display="none";
}
}catch(e2){
error.textContent="Login failed: "+e2.message;
error.style.display="block";
loginForm.style.display="block";
loading.style.display="none";
}
}
}

window.onload=async function(){
const c=JSON.parse(localStorage.getItem("currentUser")||"null");
if(c&&c.phone){
try{
const q=await db.collection("users").where("phone","==",c.phone).get();
if(!q.empty){
window.location.href="dashboard.html";
return;
}
localStorage.removeItem("currentUser");
}catch(e){}
}
createAutoUsers();
};
</script>
</body>
</html>
