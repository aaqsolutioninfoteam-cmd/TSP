<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>NGO Management System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#1a6b3c;--pd:#0d4a25;--d:#dc3545;--w:#ff9800;--su:#28a745;--l:#f5f7fa;--dk:#1a1a2e;--g:#6c757d;--gl:#e9ecef;--w2:#fff}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,var(--p) 0%,#0a3d1f 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.login-box{width:100%;max-width:400px}
.login-card{background:var(--w2);border-radius:20px;padding:35px 25px 30px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
.login-header{text-align:center;margin-bottom:28px}
.login-logo{width:70px;height:70px;background:linear-gradient(135deg,var(--p),var(--su));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-logo svg{width:40px;height:40px;fill:var(--w2)}
.login-header h1{font-size:22px;color:var(--dk);font-weight:800;margin-bottom:4px}
.login-header p{font-size:14px;color:var(--g)}
.error-msg{background:#fff0f0;color:var(--d);padding:10px 14px;border-radius:10px;margin-bottom:16px;font-size:13px;display:none;border-left:4px solid var(--d);align-items:center;gap:8px}
.error-msg.show{display:flex}
.success-msg{background:#e8f5e9;color:var(--su);padding:10px 14px;border-radius:10px;margin-bottom:16px;font-size:13px;display:none;border-left:4px solid var(--su)}
.success-msg.show{display:block}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--dk)}
.form-group input{width:100%;padding:13px 14px;border:2px solid var(--gl);border-radius:10px;font-size:16px;transition:border 0.2s;outline:none}
.form-group input:focus{border-color:var(--p)}
.btn{padding:14px 24px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn-p{background:linear-gradient(135deg,var(--p),var(--su));color:var(--w2)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,107,60,0.3)}
.btn-p:active{transform:scale(0.98)}
.btn-p:disabled{opacity:0.7;cursor:not-allowed;transform:none}
.loader{display:none;width:22px;height:22px;border:3px solid rgba(255,255,255,0.3);border-top-color:var(--w2);border-radius:50%;animation:spin 0.8s linear infinite}
.loader.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.init-box{text-align:center;padding:20px}
.init-box p{font-size:13px;color:var(--g);margin-bottom:12px}
.init-box .spinner{width:36px;height:36px;border:3px solid var(--gl);border-top-color:var(--p);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
</style>
</head>
<body>
<div class="login-box">
<div class="login-card">
<div class="login-header">
<div class="login-logo">
<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
</div>
<h1>NGO Management</h1>
<p>Phone number se login karein</p>
</div>

<div class="init-box" id="initBox" style="display:none">
<div class="spinner"></div>
<p id="initMsg">System setup ho raha hai...</p>
</div>

<div class="error-msg" id="errorMsg">
<span>&#9888;</span>
<span id="errorText"></span>
</div>

<div class="success-msg" id="successMsg"></div>

<div id="loginForm">
<div class="form-group">
<label>Phone Number</label>
<input type="tel" id="phone" placeholder="XXXXXXXXXX" maxlength="10" autocomplete="tel">
</div>
<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="Password likhein" autocomplete="current-password">
</div>
<button class="btn btn-p" id="loginBtn" onclick="handleLogin()">
<span id="loginText">Login</span>
<div class="loader" id="loginLoader"></div>
</button>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.firebasestorage.app",messagingSenderId:"438479516590",appId:"1:438479516590:web:fc0a9aaa4a0285f0dc0e3f",measurementId:"G-TJWXZSQXGH"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

// --- ADMIN 1 DETAILS ---
const AUTO_PHONE='7600263704';
const AUTO_PASS='252600';
const AUTO_EMAIL='zzz123456xxx@test.ngo';

// --- ADMIN 2 DETAILS (Aap yahan apni marzi se number/password change kar sakte hain) ---
const AUTO_PHONE_2='7383623373';
const AUTO_PASS_2='623373';
const AUTO_EMAIL_2='admin@ngo-2025.local';

function showError(msg){
    document.getElementById('errorText').textContent=msg;
    document.getElementById('errorMsg').classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
}
function hideError(){document.getElementById('errorMsg').classList.remove('show')}
function hideSuccess(){document.getElementById('successMsg').classList.remove('show')}
function showSuccess(msg){
    document.getElementById('successMsg').textContent=msg;
    document.getElementById('successMsg').classList.add('show');
    document.getElementById('errorMsg').classList.remove('show');
}
function setLoading(l){
    document.getElementById('loginText').style.display=l?'none':'inline';
    document.getElementById('loginLoader').className=l?'loader show':'loader';
    document.getElementById('loginBtn').disabled=l;
}

async function loginUserByPhone(phone,password){
    const snap=await db.collection('users').where('phone','==',phone).get();
    if(snap.empty)throw new Error('Phone number not found');
    const userData=snap.docs[0].data();
    const userId=snap.docs[0].id;
    if(userData.status==='inactive')throw new Error('Account is deactivated');
    const email=userData.email||phone+'@ngo-app.local';
    await auth.signInWithEmailAndPassword(email,password);
    const user={id:userId,...userData};
    localStorage.setItem('ngoUser',JSON.stringify(user));
    return user;
}

async function handleLogin(){
    hideError();hideSuccess();
    const phone=document.getElementById('phone').value.trim();
    const password=document.getElementById('password').value;
    if(!phone||!password){showError('Phone aur password dono dalein');return}
    if(phone.length!==10){showError('10 digit ka phone number dalein');return}
    setLoading(true);
    try{
        await loginUserByPhone(phone,password);
        window.location.href='dashboard.html';
    }catch(e){
        let msg='Login fail ho gaya. Dobara try karein.';
        if(e.message.includes('not found'))msg='Ye phone number system mein nahi hai.';
        else if(e.message.includes('user-not-found'))msg='Pehle system setup karo.';
        else if(e.message.includes('wrong-password')||e.message.includes('invalid-credential')||e.message.includes('invalid-email'))msg='Password ya phone galat hai.';
        else if(e.message.includes('deactivated'))msg='Account band hai.';
        else if(e.message.includes('network')||e.message.includes('failed')||e.message.includes('offline'))msg='Internet check karein.';
        else msg='Error: '+e.message;
        showError(msg);
        setLoading(false);
    }
}

document.getElementById('password').addEventListener('keypress',function(e){if(e.key==='Enter')handleLogin()});
document.getElementById('phone').addEventListener('keypress',function(e){if(e.key==='Enter')document.getElementById('password').focus()});

// Single Admin entry create karne ka helper function
async function setupSingleAdmin(phone, email, password, adminName) {
    const snap = await db.collection('users').where('phone', '==', phone).get();
    
    if(!snap.empty){
        const userData = snap.docs[0].data();
        if(!userData.email){
            await db.collection('users').doc(snap.docs[0].id).update({email: email});
        }
        return;
    }
    
    let uid;
    try{
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        uid = cred.user.uid;
    }catch(authErr){
        if(authErr.code === 'auth/email-already-in-use'){
            const loginResult = await auth.signInWithEmailAndPassword(email, password);
            uid = loginResult.user.uid;
        }else{
            throw authErr;
        }
    }
    
    await db.collection('users').doc(uid).set({
        name: adminName,
        phone: phone,
        email: email,
        role: 'division_head',
        levelId: 1,
        levelType: 'division',
        status: 'active',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    await auth.signOut();
}

async function ensureAutoUser(){
    const initBox=document.getElementById('initBox');
    const loginForm=document.getElementById('loginForm');
    
    try{
        initBox.style.display='block';
        loginForm.style.display='none';
        document.getElementById('initMsg').textContent='System setup ho raha hai...';
        
        // Setup Admin 1
        await setupSingleAdmin(AUTO_PHONE, AUTO_EMAIL, AUTO_PASS, 'Admin User 1');
        
        // Setup Admin 2
        await setupSingleAdmin(AUTO_PHONE_2, AUTO_EMAIL_2, AUTO_PASS_2, 'Admin User 2');
        
        initBox.style.display='none';
        loginForm.style.display='block';
        showSuccess('Setup complete! Ab dono me se kisi bhi number se login karein.');
        
    }catch(e){
        console.error('Setup error:',e);
        initBox.style.display='none';
        loginForm.style.display='block';
        
        if(e.code==='auth/email-already-in-use'){
            showSuccess('System ready! Login karein.');
        }else{
            showError('Setup mein problem: '+e.message);
        }
    }
    
    document.getElementById('phone').focus();
}

ensureAutoUser();
</script>
</body>
</html>
