.empty-state{text-align:center;padding:40px 20px;color:var(--gray)}

<script>
const firebaseConfig={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.firebasestorage.app",messagingSenderId:"438479516590",appId:"1:438479516590:web:fc0a9aaa4a0285f0dc0e3f",measurementId:"G-TJWXZSQXGH"};

const menus={division_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Districts',icon:'fa-map',file:'districts.html'},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Departments',icon:'fa-building',file:'departments.html'},{label:'Designations',icon:'fa-id-badge',file:'designations.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Org Tree',icon:'fa-sitemap',file:'org-tree.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'Reports',icon:'fa-chart-bar',file:'reports.html'},{label:'Dept Dashboard',icon:'fa-chart-pie',file:'dept-dashboard.html'},{label:'Access Control',icon:'fa-shield-alt',file:'access-control.html'},{label:'Maintenance',icon:'fa-wrench',file:'maintenance.html'},{label:'Announcements',icon:'fa-bullhorn',file:'announcements.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}],district_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'Reports',icon:'fa-chart-bar',file:'reports.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}],area_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}]};const bottomNavs={division_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Announce',icon:'fa-bullhorn',file:'announcements.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}],district_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}],area_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}]};

async function checkSystemAccess(moduleId){
  try{
    const raw=localStorage.getItem('ngoUser');
    if(!raw)return;
    const user=JSON.parse(raw);
    if(user.role==='division_head')return;
    const settingsSnap=await db.collection('settings').limit(1).get();
    if(!settingsSnap.empty){
      const s=settingsSnap.docs[0].data();
      if(s.maintenanceMode){
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-tools"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Under Development</h1><p style="font-size:16px;opacity:.7;line-height:1.6">'+(s.maintenanceMessage||'Software under development hai. Please wait karein.')+'</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
        throw new Error('maintenance');
      }
    }
    const accessSnap=await db.collection('user_access').where('userId','==',user.id).limit(1).get();
    if(!accessSnap.empty){
      const a=accessSnap.docs[0].data();
      if(a.expiresAt){
        const exp=a.expiresAt.seconds?new Date(a.expiresAt.seconds*1000):new Date(a.expiresAt);
        if(new Date()>exp){
          document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-lock"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Access Expired</h1><p style="font-size:16px;opacity:.7">Aapka access khatam ho gaya hai. Admin se contact karein.</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
          throw new Error('access expired');
        }
      }
      if(a.modules&&a.modules[moduleId]===false){
        window.location.href='dashboard.html';
        throw new Error('no access');
      }
    }
  }catch(e){
    if(e.message==='maintenance'||e.message==='access expired'){}
  }
}

let currentUser=null;
let userRole='';
let allZH=[];
let allAreas=[];
let editingId=null;

function requireAuth(allowedRoles){
  const raw=localStorage.getItem('ngoUser');
  if(!raw){window.location.href='index.html';return null;}
  try{
    const u=JSON.parse(raw);
    if(!u||!u.id||!allowedRoles.includes(u.role)){window.location.href='index.html';return null;}
    return u;
  }catch(e){window.location.href='index.html';return null;}
}

function showAlert(msg,type='success'){
  const t=document.getElementById('alertToast');
  t.textContent=msg;
  t.className='alert-toast '+type;
  t.style.display='block';
  setTimeout(()=>{t.style.display='none';},3000);
}


async function loadAreas(){
  try{
    let q;
    if(userRole==='division_head'){
      q=await db.collection('areas').where('divisionId','==',currentUser.levelId).get();
    }else if(userRole==='district_head'){
      q=await db.collection('areas').where('districtId','==',currentUser.levelId).get();
    }else{
      q=await db.collection('areas').where('areaId','==',currentUser.levelId).get();
    }
    allAreas=[];
    q.forEach(doc=>{if(doc.data().status==='active')allAreas.push({id:doc.id,...doc.data()});});
    populateAreaSelect();
  }catch(e){
    console.error('Error loading areas:',e);
  }
}

function populateAreaSelect(){
  const sel=document.getElementById('areaSelect');
  sel.innerHTML='<option value="">Select Area</option>';
  allAreas.forEach(a=>{
    sel.innerHTML+=`<option value="${a.id}">${a.name||a.areaName||'Area'}</option>`;
  });
}

async function loadZH(){
  try{
    let q;
    if(userRole==='division_head'){
      q=await db.collection('zeli_halqas').where('divisionId','==',currentUser.levelId).get();
    }else if(userRole==='district_head'){
      q=await db.collection('zeli_halqas').where('districtId','==',currentUser.levelId).get();
    }else{
      q=await db.collection('zeli_halqas').where('areaId','==',currentUser.levelId).get();
    }
    allZH=[];
    q.forEach(doc=>{if(doc.data().status==='active')allZH.push({id:doc.id,...doc.data()});});
    allZH.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
    renderZH(allZH);
  }catch(e){
    console.error('Error loading ZH:',e);
    document.getElementById('zhList').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Error loading data</h3><p>'+e.message+'</p></div>';
  }
}

function renderZH(list){
  const container=document.getElementById('zhList');
  if(list.length===0){
    container.innerHTML='<div class="empty-state"><i class="fas fa-mosque"></i><h3>Koi Zeli Halqa nahi</h3><p>Naya Zeli Halqa add karne ke button par click karein</p></div>';
    return;
  }
  container.innerHTML=list.map(zh=>{
    const areaName=getAreaName(zh.areaId);
    return `<div class="zh-card">
      <div class="zh-code">${zh.code||'ZH---'}</div>
      <div class="zh-masjid"><i class="fas fa-mosque"></i> ${esc(zh.masjidName)}</div>
      <div class="zh-info">
        <span><i class="fas fa-user"></i> <strong>Halqa Head:</strong> ${esc(zh.halqaHeadName)} | <a class="phone-link" href="tel:${esc(zh.halqaHeadPhone)}"><i class="fas fa-phone-alt"></i> ${esc(zh.halqaHeadPhone)}</a></span>
        ${zh.imamName?`<span><i class="fas fa-user-tie"></i> <strong>Imam:</strong> ${esc(zh.imamName)} | ${zh.imamPhone?`<a class="phone-link" href="tel:${esc(zh.imamPhone)}"><i class="fas fa-phone-alt"></i> ${esc(zh.imamPhone)}</a>`:''}</span>`:''}
        ${zh.address?`<span><i class="fas fa-map-marker-alt"></i> ${esc(zh.address)}</span>`:''}
      </div>
      ${areaName?`<div class="zh-area"><i class="fas fa-map-pin"></i> ${esc(areaName)}</div>`:''}
      <div class="zh-actions">
        <button class="edit-btn" onclick="editZH('${zh.id}')"><i class="fas fa-edit"></i> Edit</button>
        <button class="delete-btn" onclick="deleteZH('${zh.id}')"><i class="fas fa-trash"></i> Delete</button>
      </div>
    </div>`;
  }).join('');
}

function getAreaName(areaId){
  if(!areaId)return'';
  const a=allAreas.find(x=>x.id===areaId);
  return a?(a.name||a.areaName||''):'';
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

async function getNextCode(){
  try{
    const snap=await db.collection('zeli_halqas').where('divisionId','==',currentUser.levelId).get();
    let max=0;
    snap.forEach(doc=>{
      const d=doc.data();
      if(d.code){
        const n=parseInt(d.code.replace('ZH',''),10);
        if(n>max)max=n;
      }
    });
    return'ZH'+String(max+1).padStart(3,'0');
  }catch(e){
    return'ZH001';
  }
}

function openModal(){
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModalFn(){
  document.getElementById('modalOverlay').classList.remove('active');
  editingId=null;
  clearForm();
}

function clearForm(){
  document.getElementById('masjidName').value='';
  document.getElementById('zhHeadName').value='';
  document.getElementById('zhHeadPhone').value='';
  document.getElementById('imamName').value='';
  document.getElementById('imamPhone').value='';
  document.getElementById('address').value='';
  document.getElementById('areaSelect').value='';
}

function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='Naya Zeli Halqa';
  clearForm();
  if(userRole==='area_head'){
    document.getElementById('areaGroup').style.display='none';
  }else{
    document.getElementById('areaGroup').style.display='block';
    populateAreaSelect();
  }
  openModal();
}

async function editZH(id){
  const zh=allZH.find(x=>x.id===id);
  if(!zh)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Edit Zeli Halqa';
  document.getElementById('masjidName').value=zh.masjidName||'';
  document.getElementById('zhHeadName').value=zh.halqaHeadName||'';
  document.getElementById('zhHeadPhone').value=zh.halqaHeadPhone||'';
  document.getElementById('imamName').value=zh.imamName||'';
  document.getElementById('imamPhone').value=zh.imamPhone||'';
  document.getElementById('address').value=zh.address||'';
  if(userRole==='area_head'){
    document.getElementById('areaGroup').style.display='none';
  }else{
    document.getElementById('areaGroup').style.display='block';
    populateAreaSelect();
    document.getElementById('areaSelect').value=zh.areaId||'';
  }
  openModal();
}

async function saveZH(){
  const masjidName=document.getElementById('masjidName').value.trim();
  const halqaHeadName=document.getElementById('zhHeadName').value.trim();
  const halqaHeadPhone=document.getElementById('zhHeadPhone').value.trim();
  const imamName=document.getElementById('imamName').value.trim();
  const imamPhone=document.getElementById('imamPhone').value.trim();
  const address=document.getElementById('address').value.trim();
  const areaId=document.getElementById('areaSelect').value;

  if(!masjidName){showAlert('Masjid name required','error');return;}
  if(!halqaHeadName){showAlert('Halqa Head name required','error');return;}
  if(!halqaHeadPhone||halqaHeadPhone.length!==10){showAlert('10 digit phone required','error');return;}
  if(!/^\d{10}$/.test(halqaHeadPhone)){showAlert('Phone sirf digits hona chahiye','error');return;}
  if(imamPhone&&imamPhone.length!==10){showAlert('Imam phone 10 digit ka hona chahiye','error');return;}
  if(imamPhone&&!/^\d{10}$/.test(imamPhone)){showAlert('Imam phone sirf digits','error');return;}
  if(userRole!=='area_head'&&!areaId){showAlert('Area select karein','error');return;}

  document.getElementById('saveBtn').innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving...';
  document.getElementById('saveBtn').disabled=true;

  try{
    let selectedArea=null;
    if(userRole==='area_head'){
      selectedArea={id:currentUser.levelId};
    }else{
      selectedArea=allAreas.find(a=>a.id===areaId);
    }

    let districtId='';
    let divisionId=currentUser.levelId;
    if(userRole==='area_head'){
      districtId=currentUser.parentId||'';
      divisionId=currentUser.grandParentId||currentUser.divisionId||'';
    }else if(userRole==='district_head'){
      districtId=currentUser.levelId;
      divisionId=currentUser.parentId||currentUser.divisionId||'';
    }else{
      divisionId=currentUser.levelId;
    }

    if(selectedArea){
      if(selectedArea.districtId)districtId=selectedArea.districtId;
      if(selectedArea.divisionId)divisionId=selectedArea.divisionId;
    }

    const data={
      masjidName,
      halqaHeadName,
      halqaHeadPhone,
      imamName:imamName||'',
      imamPhone:imamPhone||'',
      address:address||'',
      areaId:selectedArea?selectedArea.id:'',
      districtId,
      divisionId,
      status:'active',
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    };

    if(editingId){
      await db.collection('zeli_halqas').doc(editingId).update(data);
      showAlert('Zeli Halqa update ho gaya!');
    }else{
      if(userRole==='district_head'){
        data.createdBy=currentUser.id||currentUser.uid||'system';
        data.createdByName=currentUser.name||'';
        data.levelId=currentUser.levelId;
        data.level='district_head';
        data.approvalStatus='pending';
        await db.collection('approvals').add({
          collection:'zeli_halqas',
          data,
          requestedBy:currentUser.id||currentUser.uid||'system',
          requestedByName:currentUser.name||'',
          requestedByRole:userRole,
          levelId:currentUser.levelId,
          status:'pending',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        showAlert('Approval ke liye bheja gaya!','warning');
      }else{
        const code=await getNextCode();
        data.code=code;
        data.createdBy=currentUser.id||currentUser.uid||'system';
        data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('zeli_halqas').add(data);
        showAlert('Zeli Halqa add ho gaya!');
      }
    }
    closeModalFn();
    loadZH();
  }catch(e){
    console.error('Save error:',e);
    showAlert('Error: '+e.message,'error');
  }finally{
    document.getElementById('saveBtn').innerHTML='<i class="fas fa-save"></i> Save';
    document.getElementById('saveBtn').disabled=false;
  }
}

async function deleteZH(id){
  if(!confirm('Kya aap is Zeli Halqa ko delete karna chahte hain?'))return;
  try{
    await db.collection('zeli_halqas').doc(id).update({status:'deleted',deletedAt:firebase.firestore.FieldValue.serverTimestamp()});
    showAlert('Zeli Halqa delete ho gaya!');
    loadZH();
  }catch(e){
    showAlert('Error: '+e.message,'error');
  }
}

function setupSearch(){
  document.getElementById('searchInput').addEventListener('input',function(){
    const s=this.value.toLowerCase();
    if(!s){renderZH(allZH);return;}
    const filtered=allZH.filter(z=>
      (z.masjidName||'').toLowerCase().includes(s)||
      (z.halqaHeadName||'').toLowerCase().includes(s)||
      (z.halqaHeadPhone||'').includes(s)||
      (z.imamName||'').toLowerCase().includes(s)||
      (z.address||'').toLowerCase().includes(s)||
      (z.code||'').toLowerCase().includes(s)||
      (getAreaName(z.areaId)||'').toLowerCase().includes(s)
    );
    renderZH(filtered);
  });
}

document.addEventListener('DOMContentLoaded',async function(){
  await checkSystemAccess('zeli_halqas');
  currentUser=requireAuth(['division_head','district_head','area_head']);
  if(!currentUser)return;

  userRole=currentUser.role;

  buildSidebar(currentUser);
  buildBottomNav(currentUser);

  document.getElementById('menuBtn').addEventListener('click',toggleSidebar);
  document.getElementById('closeSidebar').addEventListener('click',closeSidebar);
  document.getElementById('sidebarOverlay').addEventListener('click',closeSidebar);
  document.getElementById('addBtn').addEventListener('click',openAddModal);
  document.getElementById('closeModal').addEventListener('click',closeModalFn);
  document.getElementById('cancelBtn').addEventListener('click',closeModalFn);
  document.getElementById('saveBtn').addEventListener('click',saveZH);

  document.getElementById('modalOverlay').addEventListener('click',function(e){
    if(e.target===this)closeModalFn();
  });

  setupSearch();
  loadAreas();
  loadZH();
});


function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}
function buildSidebar(user){
  const nameEl=document.getElementById('sidebarName');
  const phoneEl=document.getElementById('sidebarPhone');
  const roleEl=document.getElementById('sidebarRole');
  const avatarEl=document.getElementById('avatarEl');
  if(nameEl)nameEl.textContent=user.name;
  if(phoneEl)phoneEl.textContent=user.phone||'-';
  if(roleEl)roleEl.textContent=user.role.replace(/_/g,' ');
  if(avatarEl)avatarEl.textContent=user.name.charAt(0).toUpperCase();
  const menu=menus[user.role]||[];
  const cont=document.getElementById('sidebarMenu');
  if(!cont)return;
  cont.innerHTML='';
  menu.forEach(m=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+m.icon+'"></i> '+m.label;
    if(m.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      closeSidebar();
      if(m.file==='logout'){localStorage.removeItem('ngoUser');window.location.href='index.html';return}
      if(m.file!=='dashboard.html')window.location.href=m.file;
    };
    if(m.icon==='fa-sign-out-alt')a.classList.add('logout-btn');
    cont.appendChild(a);
  });
}
function buildBottomNav(user){
  const nav=document.getElementById('bottomNav');
  if(!nav)return;
  nav.innerHTML='';
  const items=bottomNavs[user.role]||[];
  items.forEach(b=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+b.icon+'"></i><span>'+b.label+'</span>';
    if(b.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      if(b.file==='sidebar'){toggleSidebar();return}
      if(b.file!=='dashboard.html')window.location.href=b.file;
    };
    nav.appendChild(a);
  });
}
</script>
