async function checkSystemAccess(moduleId){
  try{
    const raw=localStorage.getItem('ngoUser');
    if(!raw)return;
    const user=JSON.parse(raw);
    if(user.role==='division_head')return;
    const settingsSnap=await db.collection('settings').limit(1).get();
    if(!settingsSnap.empty){
      const s=settingsSnap.docs[0].data();
      if(s.maintenanceMode){
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-tools"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Under Development</h1><p style="font-size:16px;opacity:.7;line-height:1.6">'+(s.maintenanceMessage||'Software under development hai. Please wait karein.')+'</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
        throw new Error('maintenance');
      }
    }
    const accessSnap=await db.collection('user_access').where('userId','==',user.id).limit(1).get();
    if(!accessSnap.empty){
      const a=accessSnap.docs[0].data();
      if(a.expiresAt){
        const exp=a.expiresAt.seconds?new Date(a.expiresAt.seconds*1000):new Date(a.expiresAt);
        if(new Date()>exp){
          document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-lock"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Access Expired</h1><p style="font-size:16px;opacity:.7">Aapka access khatam ho gaya hai. Admin se contact karein.</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
          throw new Error('access expired');
        }
      }
      if(a.modules&&a.modules[moduleId]===false){
        window.location.href='dashboard.html';
        throw new Error('no access');
      }
    }
  }catch(e){
    if(e.message==='maintenance'||e.message==='access expired'){}
  }
}

let currentUser=null;
let userRole='';
let areas=[];
let districts=[];
let allUsers=[];
let currentEditId=null;

function requireAuth(roles){
  const raw=localStorage.getItem('ngoUser');
  if(!raw){window.location.href='index.html';return null}
  try{
    const user=JSON.parse(raw);
    if(!roles||roles.includes(user.role))return user;
    window.location.href='dashboard.html';
    return null;
  }catch(e){window.location.href='index.html';return null}
}

function showAlert(msg,type='success'){
  const c=document.getElementById('alertContainer');
  const a=document.createElement('div');
  a.className='alert alert-'+type;
  const icon=type==='success'?'fa-check-circle':type==='danger'?'fa-exclamation-circle':'fa-exclamation-triangle';
  a.innerHTML='<i class="fas '+icon+'"></i> '+msg;
  c.appendChild(a);
  a.classList.add('show');
  setTimeout(()=>{a.classList.remove('show');setTimeout(()=>a.remove(),300)},3500);
}


function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-tab="'+tab+'"]').classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='createhead')loadAreaHeads();
}


async function loadDistricts(){
  try{
    let q;
    if(userRole==='division_head'){
      q=await db.collection('districts').where('divisionId','==',currentUser.levelId).get();
    }else{
      q=await db.collection('districts').where('status','==','active').get();
    }
    districts=[];
    q.forEach(doc=>{if(userRole==='division_head'){if(doc.data().status==='active')districts.push({id:doc.id,...doc.data()})}else{districts.push({id:doc.id,...doc.data()})}});
  }catch(e){
    console.error('Districts load error:',e);
  }
}

async function loadAreas(){
  try{
    let q;
    if(userRole==='division_head'){
      q=await db.collection('areas').where('divisionId','==',currentUser.levelId).get();
    }else{
      q=await db.collection('areas').where('districtId','==',currentUser.levelId).get();
    }
    areas=[];
    q.forEach(doc=>{if(doc.data().status==='active')areas.push({id:doc.id,...doc.data()})});
    areas.sort((a,b)=>(a.code||'').localeCompare(b.code||''));
    renderAreas();
  }catch(e){
    console.error('Areas load error:',e);
    document.getElementById('areasList').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading areas</p></div>';
  }
}

function getDistrictName(id){
  const d=districts.find(x=>x.id===id);
  return d?d.name:'Unknown';
}

async function getZhCount(areaId){
  try{
    const q=await db.collection('zeli_halqas').where('areaId','==',areaId).get();
    return q.docs.filter(d=>d.data().status==='active').length;
  }catch(e){return 0}
}

function renderAreas(filter=''){
  const container=document.getElementById('areasList');
  let filtered=areas;
  if(filter){
    const f=filter.toLowerCase();
    filtered=areas.filter(a=>(a.name||'').toLowerCase().includes(f)||(a.code||'').toLowerCase().includes(f)||(a.headName||'').toLowerCase().includes(f));
  }
  if(filtered.length===0){
    container.innerHTML='<div class="empty-state"><i class="fas fa-map-marker-alt"></i><p>Koi area nahi mila</p></div>';
    return;
  }
  let html='';
  filtered.forEach(a=>{
    const hasHead=a.headName&&a.headName.trim()!=='';
    html+='<div class="area-card fade-in">';
    html+='<div class="area-card-header">';
    html+='<div><div class="area-name">'+escHtml(a.name)+'</div>';
    html+='<div class="area-district"><i class="fas fa-map"></i> '+escHtml(getDistrictName(a.districtId))+'</div></div>';
    html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">';
    html+='<span class="area-code">'+escHtml(a.code||'N/A')+'</span>';
    html+='<span class="zh-count" id="zh-'+a.id+'"><i class="fas fa-layer-group"></i> ...</span>';
    html+='</div></div>';
    if(hasHead){
      html+='<div class="area-head"><i class="fas fa-user-tie"></i>';
      html+='<div class="area-head-info"><div class="area-head-name">'+escHtml(a.headName)+'</div>';
      html+='<div class="area-head-phone"><i class="fas fa-phone"></i> '+escHtml(a.headPhone||'N/A')+'</div></div></div>';
    }else{
      html+='<div class="area-head" style="background:#fff3cd"><i class="fas fa-user-slash" style="color:#ff9800"></i>';
      html+='<div class="area-head-info"><div class="area-head-name" style="color:#ff9800">VACANT</div>';
      html+='<div class="area-head-phone">Head assign nahi hai</div></div>';
      html+='<span class="vacant-badge">Vacant</span></div>';
    }
    html+='<div class="area-actions">';
    html+='<button class="btn-edit" onclick="editArea(\''+a.id+'\')"><i class="fas fa-edit"></i> Edit</button>';
    html+='<button class="btn-delete" onclick="deleteArea(\''+a.id+'\')"><i class="fas fa-trash"></i> Delete</button>';
    html+='</div></div>';
  });
  container.innerHTML=html;
  filtered.forEach(a=>loadZhCountForCard(a.id));
}

async function loadZhCountForCard(areaId){
  const count=await getZhCount(areaId);
  const el=document.getElementById('zh-'+areaId);
  if(el)el.innerHTML='<i class="fas fa-layer-group"></i> '+count+' ZH';
}

function filterAreas(){
  renderAreas(document.getElementById('searchInput').value);
}

function openAddModal(){
  currentEditId=null;
  document.getElementById('areaModalTitle').textContent='Naya Area';
  document.getElementById('areaSubmitBtn').textContent='Area Save Karein';
  document.getElementById('areaForm').reset();
  document.getElementById('areaId').value='';
  document.getElementById('codePreview').textContent='';
  populateDistrictSelect();
  document.getElementById('areaModal').classList.add('show');
}

function populateDistrictSelect(){
  const sel=document.getElementById('areaDistrict');
  const grp=document.getElementById('districtGroup');
  if(userRole==='division_head'){
    grp.style.display='block';
    sel.innerHTML='<option value="">-- District Select --</option>';
    districts.forEach(d=>{
      sel.innerHTML+='<option value="'+d.id+'">'+escHtml(d.name)+'</option>';
    });
  }else{
    grp.style.display='none';
    sel.innerHTML='<option value="'+currentUser.levelId+'">'+escHtml(currentUser.levelName||'My District')+'</option>';
  }
}

async function getNextAreaCode(){
  let maxNum=0;
  areas.forEach(a=>{
    const m=(a.code||'').match(/^A(\d+)$/);
    if(m){const n=parseInt(m[1]);if(n>maxNum)maxNum=n}
  });
  return 'A'+String(maxNum+1).padStart(3,'0');
}

async function previewCode(){
  const code=await getNextAreaCode();
  document.getElementById('codePreview').textContent='Auto Code: '+code;
}
document.getElementById('areaName').addEventListener('input',previewCode);

function closeAreaModal(){
  document.getElementById('areaModal').classList.remove('show');
}

function editArea(id){
  const a=areas.find(x=>x.id===id);
  if(!a)return;
  currentEditId=id;
  document.getElementById('areaModalTitle').textContent='Area Edit Karein';
  document.getElementById('areaSubmitBtn').textContent='Update Karein';
  document.getElementById('areaId').value=id;
  populateDistrictSelect();
  if(userRole==='division_head'){
    document.getElementById('areaDistrict').value=a.districtId||'';
  }
  document.getElementById('areaName').value=a.name||'';
  document.getElementById('areaModal').classList.add('show');
}

async function saveArea(e){
  e.preventDefault();
  const btn=document.getElementById('areaSubmitBtn');
  btn.disabled=true;
  btn.textContent='Saving...';
  try{
    const name=document.getElementById('areaName').value.trim();
    const districtId=userRole==='division_head'?document.getElementById('areaDistrict').value:currentUser.levelId;
    if(!districtId){showAlert('District select karein','danger');return}
    if(!name){showAlert('Area name likhein','danger');return}
    let divisionId='';
    if(userRole==='division_head'){
      divisionId=currentUser.levelId;
    }else{
      const dist=districts.find(d=>d.id===districtId);
      divisionId=dist?dist.divisionId:(currentUser.divisionId||'');
    }
    if(currentEditId){
      if(userRole==='district_head'){
        const area=areas.find(a=>a.id===currentEditId);
        const data={name:name,districtId:districtId,divisionId:divisionId};
        await db.collection('approvals').add({
          type:'area_edit',
          collection:'areas',
          docId:currentEditId,
          previousData:{name:area.name,districtId:area.districtId},
          newData:data,
          requestedBy:currentUser.id,
          requestedByName:currentUser.name,
          status:'pending',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        showAlert('Edit request approval ke liye bhej di gayi hai','warning');
      }else{
        await db.collection('areas').doc(currentEditId).update({name:name,districtId:districtId,divisionId:divisionId});
        showAlert('Area update ho gaya');
      }
    }else{
      const code=await getNextAreaCode();
      const areaData={name:name,code:code,districtId:districtId,divisionId:divisionId,headId:'',headName:'',headPhone:'',status:'active',createdAt:firebase.firestore.FieldValue.serverTimestamp()};
      if(userRole==='district_head'){
        await db.collection('approvals').add({
          type:'area_create',
          collection:'areas',
          data:areaData,
          requestedBy:currentUser.id,
          requestedByName:currentUser.name,
          status:'pending',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        showAlert('Naya area approval ke liye bhej diya gaya hai','warning');
      }else{
        await db.collection('areas').add(areaData);
        showAlert('Naya area ban gaya!');
      }
    }
    closeAreaModal();
    await loadAreas();
  }catch(e){
    console.error(e);
    showAlert('Error: '+e.message,'danger');
  }finally{
    btn.disabled=false;
    btn.textContent=currentEditId?'Update Karein':'Area Save Karein';
  }
}

async function deleteArea(id){
  const a=areas.find(x=>x.id===id);
  if(!a)return;
  if(!confirm('Kya aap "'+a.name+'" area delete karna chahte hain?'))return;
  try{
    if(userRole==='district_head'){
      await db.collection('approvals').add({
        type:'area_delete',
        collection:'areas',
        docId:id,
        previousData:{name:a.name,code:a.code},
        requestedBy:currentUser.id,
        requestedByName:currentUser.name,
        status:'pending',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      showAlert('Delete request approval ke liye bhej di gayi hai','warning');
    }else{
      await db.collection('areas').doc(id).update({status:'deleted'});
      showAlert('Area delete ho gaya');
    }
    await loadAreas();
  }catch(e){
    showAlert('Error: '+e.message,'danger');
  }
}

async function loadAreaHeads(){
  try{
    let q;
    if(userRole==='division_head'){
      q=await db.collection('users').where('divisionId','==',currentUser.levelId).get();
    }else{
      q=await db.collection('users').where('districtId','==',currentUser.levelId).get();
    }
    allUsers=[];
    q.forEach(doc=>{if(doc.data().role==='area_head')allUsers.push({id:doc.id,...doc.data()})});
    renderHeads();
  }catch(e){
    console.error('Heads load error:',e);
  }
}

function renderHeads(){
  const container=document.getElementById('headsList');
  if(allUsers.length===0){
    container.innerHTML='<div class="empty-state"><i class="fas fa-user-slash"></i><p>Koi Area Head nahi mila</p></div>';
    return;
  }
  let html='';
  allUsers.forEach(u=>{
    html+='<div class="area-card fade-in">';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    html+='<div><div class="area-name"><i class="fas fa-user-tie" style="color:#1a6b3c;margin-right:6px"></i>'+escHtml(u.name)+'</div>';
    html+='<div class="area-district"><i class="fas fa-phone"></i> '+escHtml(u.phone||u.email)+'</div>';
    if(u.areaName){
      html+='<div class="area-district"><i class="fas fa-map-marker-alt"></i> '+escHtml(u.areaName)+'</div>';
    }
    html+='</div>';
    html+='<span class="area-code">AREA HEAD</span></div></div>';
  });
  container.innerHTML=html;
}

async function populateHeadAreaSelect(){
  const sel=document.getElementById('headArea');
  sel.innerHTML='<option value="">-- Area Select --</option>';
  const myAreas=areas.filter(a=>!a.headId||a.headId==='');
  if(myAreas.length===0){
    myAreas.push(...areas);
  }
  myAreas.forEach(a=>{
    const badge=a.headId?' (Assigned)':'';
    sel.innerHTML+='<option value="'+a.id+'" data-name="'+escHtml(a.name)+'">'+escHtml(a.name)+' ['+escHtml(a.code||'')+']'+badge+'</option>';
  });
}

function openHeadModal(){
  document.getElementById('headForm').reset();
  document.getElementById('headPassword').value='123456';
  document.getElementById('headCredentials').innerHTML='';
  populateHeadAreaSelect();
  document.getElementById('headModal').classList.add('show');
}

function closeHeadModal(){
  document.getElementById('headModal').classList.remove('show');
}

async function createHead(e){
  e.preventDefault();
  const btn=document.getElementById('headSubmitBtn');
  btn.disabled=true;
  btn.textContent='Creating...';
  try{
    const areaId=document.getElementById('headArea').value;
    const areaName=document.getElementById('headArea').selectedOptions[0]?.getAttribute('data-name')||'';
    const name=document.getElementById('headName').value.trim();
    const phone=document.getElementById('headPhone').value.trim();
    const password=document.getElementById('headPassword').value;
    if(!areaId||!name||!phone){showAlert('Saari zaroori maloomat bharein','danger');return}
    if(phone.length!==10||!/^\d+$/.test(phone)){showAlert('Mobile number 10 digit ka hona chahiye','danger');return}
    if(password.length<6){showAlert('Password kam se kam 6 characters ka hona chahiye','danger');return}
    const email=phone+'@ngo-app.local';
    const area=areas.find(a=>a.id===areaId);
    const districtId=area?area.districtId:currentUser.levelId;
    const divisionId=area?(area.divisionId||''):(currentUser.divisionId||'');
    let userCred;
    try{
      userCred=await auth.createUserWithEmailAndPassword(email,password);
    }catch(authErr){
      if(authErr.code==='auth/email-already-in-use'){
        showAlert('Yeh phone number pehle se registered hai','danger');
        return;
      }
      throw authErr;
    }
    const uid=userCred.user.uid;
    await db.collection('users').doc(uid).set({
      name:name,
      phone:phone,
      email:email,
      role:'area_head',
      levelId:areaId,
      levelType:'area',
      areaName:areaName,
      districtId:districtId,
      divisionId:divisionId,
      createdBy:currentUser.id||currentUser.uid||'system',
      createdByName:currentUser.name||'',
      status:'active',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('areas').doc(areaId).update({
      headId:uid,
      headName:name,
      headPhone:phone
    });
    let credHtml='<div class="credentials-box">';
    credHtml+='<h4><i class="fas fa-key"></i> Login Credentials</h4>';
    credHtml+='<div class="cred-item"><span class="cred-label">Email:</span><span class="cred-value">'+escHtml(email)+'</span></div>';
    credHtml+='<div class="cred-item"><span class="cred-label">Phone:</span><span class="cred-value">'+escHtml(phone)+'</span></div>';
    credHtml+='<div class="cred-item"><span class="cred-label">Password:</span><span class="cred-value">'+escHtml(password)+'</span></div>';
    credHtml+='<div class="cred-item"><span class="cred-label">Role:</span><span class="cred-value">Area Head</span></div>';
    credHtml+='</div>';
    document.getElementById('headCredentials').innerHTML=credHtml;
    showAlert('Area Head ban gaya!');
    await loadAreas();
    await loadAreaHeads();
    document.getElementById('headForm').reset();
    document.getElementById('headPassword').value='123456';
  }catch(e){
    console.error(e);
    showAlert('Error: '+e.message,'danger');
  }finally{
    btn.disabled=false;
    btn.textContent='Head Create Karein';
  }
}

function escHtml(s){
  if(!s)return '';
  const d=document.createElement('div');
  d.textContent=String(s);
  return d.innerHTML;
}

async function init(){
  await checkSystemAccess('areas');
  currentUser=requireAuth(['division_head','district_head']);
  if(!currentUser)return;
  userRole=currentUser.role;
  buildSidebar(currentUser);
  buildBottomNav(currentUser);
  await loadDistricts();
  await loadAreas();
  if(userRole==='district_head'){
    document.getElementById('tabsContainer').innerHTML+='<div class="tab" data-tab="createhead" onclick="switchTab(\'createhead\')"><i class="fas fa-user-plus"></i> Create Head</div>';
  }
}

document.addEventListener('DOMContentLoaded',init);

document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',function(e){
    if(e.target===this)this.classList.remove('show');
  });
});


function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}
function buildSidebar(user){
  const nameEl=document.getElementById('sidebarName');
  const phoneEl=document.getElementById('sidebarPhone');
  const roleEl=document.getElementById('sidebarRole');
  const avatarEl=document.getElementById('avatarEl');
  if(nameEl)nameEl.textContent=user.name;
  if(phoneEl)phoneEl.textContent=user.phone||'-';
  if(roleEl)roleEl.textContent=user.role.replace(/_/g,' ');
  if(avatarEl)avatarEl.textContent=user.name.charAt(0).toUpperCase();
  const menu=menus[user.role]||[];
  const cont=document.getElementById('sidebarMenu');
  if(!cont)return;
  cont.innerHTML='';
  menu.forEach(m=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+m.icon+'"></i> '+m.label;
    if(m.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      closeSidebar();
      if(m.file==='logout'){localStorage.removeItem('ngoUser');window.location.href='index.html';return}
      if(m.file!=='dashboard.html')window.location.href=m.file;
    };
    if(m.icon==='fa-sign-out-alt')a.classList.add('logout-btn');
    cont.appendChild(a);
  });
}
function buildBottomNav(user){
  const nav=document.getElementById('bottomNav');
  if(!nav)return;
  nav.innerHTML='';
  const items=bottomNavs[user.role]||[];
  items.forEach(b=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+b.icon+'"></i><span>'+b.label+'</span>';
    if(b.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      if(b.file==='sidebar'){toggleSidebar();return}
      if(b.file!=='dashboard.html')window.location.href=b.file;
    };
    nav.appendChild(a);
  });
}
</script>
