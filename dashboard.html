<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f5f7fa;color:#1a1a2e;max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:70px}
:root{--primary:#1a6b3c;--dark:#0d4a25;--red:#dc3545;--orange:#ff9800;--success:#28a745;--light:#f5f7fa;--dark2:#1a1a2e;--gray:#6c757d;--border:#e9ecef;--white:#fff;--radius:14px}
.header{position:sticky;top:0;z-index:100;background:var(--primary);color:var(--white);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:0 0 var(--radius) var(--radius)}
.header h1{font-size:18px;font-weight:700}
.header-right{display:flex;align-items:center;gap:12px}
.hamburger{background:none;border:none;color:var(--white);font-size:24px;cursor:pointer;padding:4px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200}
.sidebar-overlay.active{display:block}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--white);z-index:300;transition:left 0.3s ease;overflow-y:auto;border-radius:0 var(--radius) var(--radius) 0;box-shadow:2px 0 10px rgba(0,0,0,0.1)}
.sidebar.open{left:0}
.sidebar-header{background:var(--primary);color:var(--white);padding:20px 16px;border-radius:0 var(--radius) 0 0}
.sidebar-header h2{font-size:16px;margin-bottom:4px}
.sidebar-header p{font-size:12px;opacity:0.8}
.sidebar-header .role-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:20px;font-size:11px;margin-top:6px;text-transform:capitalize}
.sidebar-menu{padding:10px 0}
.sidebar-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--dark2);text-decoration:none;font-size:14px;transition:background 0.2s}
.sidebar-menu a:hover,.sidebar-menu a.active{background:var(--light);color:var(--primary);font-weight:600}
.sidebar-menu a.active{border-right:3px solid var(--primary)}
.sidebar-menu a svg{width:20px;height:20px;flex-shrink:0}
.sidebar-menu .logout-btn{color:var(--red);border-top:1px solid var(--border);margin-top:6px}
.main{padding:16px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);border:1px solid var(--border)}
.stat-card .stat-num{font-size:28px;font-weight:800;color:var(--primary)}
.stat-card .stat-label{font-size:12px;color:var(--gray);margin-top:4px}
.stat-card:nth-child(2) .stat-num{color:var(--orange)}
.stat-card:nth-child(3) .stat-num{color:var(--success)}
.stat-card:nth-child(4) .stat-num{color:var(--dark2)}
.stat-card:nth-child(5) .stat-num{color:var(--red)}
.stat-card:nth-child(6) .stat-num{color:var(--gray)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--primary);color:var(--white)}
.btn-primary:hover{background:var(--dark)}
.btn-danger{background:var(--red);color:var(--white)}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.alert-banner{background:linear-gradient(135deg,var(--orange),#e67e00);color:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(255,152,0,0.3)}
.alert-banner h3{font-size:14px}
.alert-banner span{font-size:22px}
.section-title{font-size:16px;font-weight:700;color:var(--dark2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px 12px 40px;border:2px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--white);outline:none;transition:border 0.2s}
.search-box input:focus{border-color:var(--primary)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--gray)}
.card{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.card-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.card-title{font-size:15px;font-weight:700;color:var(--dark2)}
.card-subtitle{font-size:12px;color:var(--gray);margin-top:2px}
.card-meta{display:flex;gap:16px;margin-top:8px}
.card-meta span{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#d4edda;color:var(--success)}
.badge-orange{background:#fff3cd;color:var(--orange)}
.badge-red{background:#f8d7da;color:var(--red)}
.expand-icon{transition:transform 0.3s;font-size:14px;color:var(--gray);width:28px;height:28px;border-radius:50%;background:var(--light);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.card.expanded .expand-icon{transform:rotate(90deg);background:rgba(26,107,60,.1);color:var(--primary);border-color:var(--primary)}
.drill-down{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.card.expanded .drill-down{display:block}
.drill-item{background:var(--light);border-radius:10px;padding:12px;margin-bottom:8px}
.drill-item h4{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:4px}
.drill-item p{font-size:12px;color:var(--gray);line-height:1.6}
.drill-sub{margin-left:12px;margin-top:8px;border-left:3px solid var(--primary);padding-left:10px}
.drill-sub h5{font-size:12px;font-weight:600;color:var(--dark2);margin-bottom:4px}
.drill-sub p{font-size:11px;color:var(--gray)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--white);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray);padding:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--dark2);margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;outline:none;transition:border 0.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.credentials-box{background:#e8f5e9;border:2px solid var(--success);border-radius:10px;padding:14px;margin-top:16px}
.credentials-box h4{color:var(--success);font-size:13px;margin-bottom:8px}
.credentials-box p{font-size:12px;color:var(--dark2);line-height:1.8}
.empty-state{text-align:center;padding:40px 20px}
.empty-state svg{width:60px;height:60px;color:var(--border);margin-bottom:12px}
.empty-state h3{font-size:16px;color:var(--gray);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--gray)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--white);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0;z-index:100}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--gray);font-size:10px;padding:4px 12px;border-radius:10px;transition:all 0.2s}
.bottom-nav a.active{color:var(--primary);font-weight:700}
.bottom-nav a svg{width:22px;height:22px}
.loading{text-align:center;padding:40px;color:var(--gray)}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.submission-item{background:var(--white);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.submission-item .info{flex:1}
.submission-item .info h4{font-size:13px;font-weight:600}
.submission-item .info p{font-size:11px;color:var(--gray)}
</style>

async function checkSystemAccess(moduleId){
  try{
    const raw=localStorage.getItem('ngoUser');
    if(!raw)return;
    const user=JSON.parse(raw);
    if(user.role==='division_head')return;
    const settingsSnap=await db.collection('settings').limit(1).get();
    if(!settingsSnap.empty){
      const s=settingsSnap.docs[0].data();
      if(s.maintenanceMode){
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Under Development</h1><p style="font-size:16px;opacity:.7;line-height:1.6">'+(s.maintenanceMessage||'Software under development hai. Please wait karein.')+'</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
        throw new Error('maintenance');
      }
    }
    const accessSnap=await db.collection('user_access').where('userId','==',user.id).limit(1).get();
    if(!accessSnap.empty){
      const a=accessSnap.docs[0].data();
      if(a.expiresAt){
        const exp=a.expiresAt.seconds?new Date(a.expiresAt.seconds*1000):new Date(a.expiresAt);
        if(new Date()>exp){
          document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Access Expired</h1><p style="font-size:16px;opacity:.7">Aapka access khatam ho gaya hai. Admin se contact karein.</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
          throw new Error('access expired');
        }
      }
      if(a.modules&&a.modules[moduleId]===false){
        window.location.href='dashboard.html';
        throw new Error('no access');
      }
    }
  }catch(e){
    if(e.message==='maintenance'||e.message==='access expired'){}
  }
}

function buildSidebar(user){
  document.getElementById('sidebarName').textContent=user.name;
  document.getElementById('sidebarPhone').textContent=user.phone;
  document.getElementById('sidebarRole').textContent=user.role.replace(/_/g,' ');
  document.getElementById('avatarEl').textContent=user.name.charAt(0).toUpperCase();
  const menu=menus[user.role]||[];
  const cont=document.getElementById('sidebarMenu');
  cont.innerHTML='';
  menu.forEach(m=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+m.icon+'"></i> '+m.label;
    if(m.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      closeSidebar();
      if(m.file==='logout'){localStorage.removeItem('ngoUser');window.location.href='index.html';return}
      if(m.file!=='dashboard.html')window.location.href=m.file;
    };
    if(m.icon==='fa-sign-out-alt')a.classList.add('logout-btn');
    cont.appendChild(a);
  });
}

function buildBottomNav(user){
  const nav=document.getElementById('bottomNav');
  nav.innerHTML='';
  const items=bottomNavs[user.role]||[];
  items.forEach(b=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+b.icon+'"></i><span>'+b.label+'</span>';
    if(b.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      if(b.file==='sidebar'){toggleSidebar();return}
      if(b.file!=='dashboard.html')window.location.href=b.file;
    };
    nav.appendChild(a);
  });
}

async function loadDistrictHeadDashboard(user){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const [areasSnap,zhSnap,personsSnap]=await Promise.all([
      db.collection('areas').where('districtId','==',user.levelId).get(),
      db.collection('zeli_halqas').where('districtId','==',user.levelId).get(),
      db.collection('persons').where('districtId','==',user.levelId).get()
    ]);
    let stats=`<div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${areasSnap.size}</div><div class="stat-label">Areas</div></div>
      <div class="stat-card"><div class="stat-num">${zhSnap.size}</div><div class="stat-label">Zeli Halqas</div></div>
      <div class="stat-card"><div class="stat-num">${personsSnap.size}</div><div class="stat-label">Persons</div></div>
      <div class="stat-card"><div class="stat-num">${zhSnap.size}</div><div class="stat-label">Pending Submissions</div></div>
    </div>`;
    let search=`<div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search areas..." oninput="filterAreaCards(this.value)"></div>`;
    let list=`<div class="section-title"><i class="fas fa-map-marker-alt"></i> Areas</div><div id="areaListContainer">`;
    if(areasSnap.empty){
      list+=`<div class="empty-state"><h3>No Areas Found</h3><p>Areas will appear once created for your district.</p></div>`;
    }else{
      for(const areaDoc of areasSnap.docs){
        const a=areaDoc.data();a.id=areaDoc.id;
        const areaZhs=zhSnap.docs.filter(z=>z.data().areaId===a.id);
        let drillItems='';
        for(const zhDoc of areaZhs){
          const z=zhDoc.data();
          drillItems+=`<div class="drill-sub"><h5>${escapeHtml(z.masjidName||'Masjid')}</h5><p><b>Halqa Head:</b> ${escapeHtml(z.halqaHeadName||'-')} | ${escapeHtml(z.halqaHeadPhone||'-')}</p><p><b>Imam:</b> ${escapeHtml(z.imamName||'-')} | ${escapeHtml(z.imamPhone||'-')}</p></div>`;
        }
        list+=`<div class="card area-card" onclick="this.classList.toggle('expanded')" data-name="${escapeHtml((a.name||'').toLowerCase())}"><div class="card-header"><div><div class="card-title">${escapeHtml(a.name||'Unnamed')}</div><div class="card-subtitle">Head: ${escapeHtml(a.headName||'-')} | ${escapeHtml(a.headPhone||'-')}</div></div><span class="expand-icon">&#8250;</span></div><div class="card-meta"><span>${areaZhs.length} Zeli Halqas</span></div><div class="drill-down">${drillItems||'<p style="font-size:12px;color:var(--gray)">No Zeli Halqas under this area.</p>'}</div></div>`;
      }
    }
    list+='</div>';
    mc.innerHTML=stats+search+list;
    await loadAnnouncementBanner(mc);

  }catch(err){
    mc.innerHTML=`<div class="empty-state"><h3>Error Loading Dashboard</h3><p>${escapeHtml(err.message)}</p></div>`;
  }
}

function filterAreaCards(q){
  const cards=document.querySelectorAll('.area-card');
  q=q.toLowerCase();
  cards.forEach(c=>{c.style.display=c.dataset.name.includes(q)?'block':'none'});
}

async function loadAreaHeadDashboard(user){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const [zhSnap,personsSnap]=await Promise.all([
      db.collection('zeli_halqas').where('areaId','==',user.levelId).get(),
      db.collection('persons').where('areaId','==',user.levelId).get()
    ]);
    let stats=`<div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${zhSnap.size}</div><div class="stat-label">Zeli Halqas</div></div>
      <div class="stat-card"><div class="stat-num">${personsSnap.size}</div><div class="stat-label">Persons</div></div>
    </div>`;
    let search=`<div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search zeli halqas..." oninput="filterZhCards(this.value)"></div>`;
    let list=`<div class="section-title"><i class="fas fa-layer-group"></i> Zeli Halqas</div><div id="zhListContainer">`;
    if(zhSnap.empty){
      list+=`<div class="empty-state"><h3>No Zeli Halqas</h3><p>Zeli halqas will appear once created for your area.</p></div>`;
    }else{
      for(const zhDoc of zhSnap.docs){
        const z=zhDoc.data();
        list+=`<div class="card zh-card" data-name="${escapeHtml((z.masjidName||'').toLowerCase())}"><div class="card-header"><div><div class="card-title">${escapeHtml(z.masjidName||'Unnamed Masjid')}</div><div class="card-subtitle">Halqa Head: ${escapeHtml(z.halqaHeadName||'-')}</div></div></div><div class="card-meta"><span>${escapeHtml(z.halqaHeadPhone||'-')}</span></div><div class="drill-item" style="margin-top:8px"><h4>Imam</h4><p>${escapeHtml(z.imamName||'-')} | ${escapeHtml(z.imamPhone||'-')}</p></div><div class="drill-item"><h4>Address</h4><p>${escapeHtml(z.address||'-')}</p></div></div>`;
      }
    }
    list+='</div>';
    mc.innerHTML=stats+search+list;
    await loadAnnouncementBanner(mc);
  }catch(err){
    mc.innerHTML=`<div class="empty-state"><h3>Error</h3><p>${escapeHtml(err.message)}</p></div>`;
  }
}

async function loadAnnouncementBanner(mc){
  try{
    const snap=await db.collection('announcements').where('active','==',true).limit(3).get();
    if(snap.empty)return;
    let banner='<div style="margin-bottom:16px">';
    snap.forEach(doc=>{
      const a=doc.data();
      const type=a.type||'info';
      const colors={urgent:'#dc3545',warning:'#ff9800',info:'#007bff',normal:'#28a745'};
      const bg=colors[type]||colors.info;
      banner+=`<div style="background:${bg}11;border-left:3px solid ${bg};border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer" onclick="window.location.href='announcements.html'">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <i class="fas fa-bullhorn" style="color:${bg};font-size:12px"></i>
          <span style="font-size:13px;font-weight:700">${escapeHtml(a.title||'Announcement')}</span>
        </div>
        <p style="font-size:12px;color:#6c757d;line-height:1.4;margin:0">${escapeHtml((a.message||'').substring(0,100))}${(a.message||'').length>100?'...':''}</p>
      </div>`;
    });
    banner+='</div>';
    mc.innerHTML=banner+mc.innerHTML;
  }catch(e){}
}

function filterZhCards(q){
  const cards=document.querySelectorAll('.zh-card');
  q=q.toLowerCase();
  cards.forEach(c=>{c.style.display=c.dataset.name.includes(q)?'block':'none'});
}

async function loadDivisionHeadDashboard(user){
  const mc=document.getElementById('mainContent');
  mc.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const [distSnap,areaSnap,zhSnap,personsSnap,deptSnap,pendingSnap]=await Promise.all([
      db.collection('districts').where('divisionId','==',user.levelId).get(),
      db.collection('areas').where('divisionId','==',user.levelId).get(),
      db.collection('zeli_halqas').where('divisionId','==',user.levelId).get(),
      db.collection('persons').where('divisionId','==',user.levelId).get(),
      db.collection('departments').where('divisionId','==',user.levelId).get(),
      db.collection('approvals').where('divisionId','==',user.levelId).get()
    ]);
    const pendingDocs=pendingSnap.docs.filter(d=>d.data().status==='pending');
    const distWithHeads=[];
    for(const d of distSnap.docs){
      const dd=d.data();dd.id=d.id;
      let headName='-',headPhone='-';
      if(dd.headId){
        try{const hu=await db.collection('users').doc(dd.headId).get();if(hu.exists){const ud=hu.data();headName=ud.name||'-';headPhone=ud.phone||'-'}}catch(e){}
      }else if(dd.headPhone){headName=dd.headName||'-';headPhone=dd.headPhone||'-'}
      distWithHeads.push({...dd,headName,headPhone});
    }
    const distCount=distSnap.size;
    const areaCount=areaSnap.size;
    const zhCount=zhSnap.size;
    const personsCount=personsSnap.size;
    const deptCount=deptSnap.size;
    const areasMap={};areaSnap.forEach(a=>{const ad=a.data();if(!areasMap[ad.districtId])areasMap[ad.districtId]=[];areasMap[ad.districtId].push({id:a.id,...ad})});
    const zhMap={};zhSnap.forEach(z=>{const zd=z.data();if(!zhMap[zd.areaId])zhMap[zd.areaId]=[];zhMap[zd.areaId].push({id:z.id,...zd})});
    const deptMap={};deptSnap.forEach(dp=>{const dd=dp.data();if(!deptMap[dd.districtId])deptMap[dd.districtId]=[];deptMap[dd.districtId].push({id:dp.id,...dd})});
    let vacantHeads=0;
    distSnap.forEach(d=>{if(!d.data().headId)vacantHeads++});
    areaSnap.forEach(a=>{if(!a.data().headId)vacantHeads++});
    let stats=`<div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${distCount}</div><div class="stat-label">Districts</div></div>
      <div class="stat-card"><div class="stat-num">${areaCount}</div><div class="stat-label">Areas</div></div>
      <div class="stat-card"><div class="stat-num">${zhCount}</div><div class="stat-label">Zeli Halqas</div></div>
      <div class="stat-card"><div class="stat-num">${personsCount}</div><div class="stat-label">Persons</div></div>
      <div class="stat-card"><div class="stat-num">${deptCount}</div><div class="stat-label">Departments</div></div>
      <div class="stat-card"><div class="stat-num">${vacantHeads}</div><div class="stat-label">Vacant Heads</div></div>
    </div>`;
    let createBtn=`<button class="btn btn-primary btn-block" onclick="openCreateModal()" style="margin-bottom:16px">+ Create Head</button>`;
    let alertBanner='';
    if(pendingDocs.length>0){
      alertBanner=`<div class="alert-banner" onclick="window.location.href='approvals.html'"><div><h3>Pending Approvals (${pendingDocs.length})</h3></div><span>&#9654;</span></div>`;
    }
    let search=`<div class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search districts..." oninput="filterDistrictCards(this.value)"></div>`;
    let list=`<div class="section-title"><i class="fas fa-map"></i> Districts</div><div id="districtListContainer">`;
    if(distWithHeads.length===0){
      list+=`<div class="empty-state"><h3>No Districts</h3><p>Create districts and assign heads to get started.</p></div>`;
    }else{
      for(const dist of distWithHeads){
        const distAreas=areasMap[dist.id]||[];
        const distDepts=deptMap[dist.id]||[];
        let drillAreas='';
        for(const area of distAreas){
          const areaZhs=zhMap[area.id]||[];
          let zhHtml='';
          for(const z of areaZhs){
            zhHtml+=`<div class="drill-sub" style="margin-left:12px;border-left:3px solid var(--success);padding-left:10px;margin-top:6px"><h5 style="font-size:12px;font-weight:600;color:var(--dark2)">${escapeHtml(z.masjidName||'Masjid')}</h5><p style="font-size:11px;color:var(--gray)"><b>Halqa Head:</b> ${escapeHtml(z.halqaHeadName||'-')} | ${escapeHtml(z.halqaHeadPhone||'-')}</p><p style="font-size:11px;color:var(--gray)"><b>Imam:</b> ${escapeHtml(z.imamName||'-')} | ${escapeHtml(z.imamPhone||'-')}</p></div>`;
          }
          drillAreas+=`<div class="drill-item"><h4>${escapeHtml(area.name||'Area')}</h4><p>Head: ${escapeHtml(area.headName||'-')} | ${escapeHtml(area.headPhone||'-')}</p><p>${areaZhs.length} Zeli Halqas</p>${zhHtml}</div>`;
        }
        let deptHtml='';
        if(distDepts.length>0){
          deptHtml='<div class="drill-item" style="margin-top:4px"><h4>Departments</h4>'+distDepts.map(dp=>`<p>- ${escapeHtml(dp.name||'Dept')}</p>`).join('')+'</div>';
        }
        list+=`<div class="card district-card" onclick="this.classList.toggle('expanded')" data-name="${escapeHtml((dist.name||'').toLowerCase())}"><div class="card-header"><div><div class="card-title">${escapeHtml(dist.name||'Unnamed')}</div><div class="card-subtitle">Head: ${escapeHtml(dist.headName||'Not Assigned')} | ${escapeHtml(dist.headPhone||'')}</div></div><span class="expand-icon">&#8250;</span></div><div class="card-meta"><span>${distAreas.length} Areas</span></div><div class="drill-down"><div class="drill-item"><h4>District Details</h4><p><b>Name:</b> ${escapeHtml(dist.name||'-')}</p><p><b>Head:</b> ${escapeHtml(dist.headName||'-')}</p><p><b>Phone:</b> ${escapeHtml(dist.headPhone||'-')}</p></div>${drillAreas}${deptHtml||''}</div></div>`;
      }
    }
    list+='</div>';
    mc.innerHTML=stats+createBtn+alertBanner+search+list;
    await loadAnnouncementBanner(mc);
  }catch(err){
    mc.innerHTML=`<div class="empty-state"><h3>Error Loading Dashboard</h3><p>${escapeHtml(err.message)}</p></div>`;
  }
}

function filterDistrictCards(q){
  const cards=document.querySelectorAll('.district-card');
  q=q.toLowerCase();
  cards.forEach(c=>{c.style.display=c.dataset.name.includes(q)?'block':'none'});
}

async function onHeadRoleChange(){
  const role=document.getElementById('headRole').value;
  const dg=document.getElementById('districtSelectGroup');
  const lg=document.getElementById('headLevelId').closest('.form-group');
  if(role==='division_head'){
    dg.style.display='none';
    lg.style.display='none';
  }else if(role==='area_head'){
    dg.style.display='block';
    lg.style.display='block';
    const sel=document.getElementById('headDistrict');
    sel.innerHTML='<option value="">Loading...</option>';
    try{
      const snap=await db.collection('districts').where('divisionId','==',currentUser.levelId).get();
      sel.innerHTML='<option value="">Select District</option>';
      snap.forEach(d=>{const o=document.createElement('option');o.value=d.id;o.textContent=d.data().name||d.id;sel.appendChild(o)});
    }catch(e){sel.innerHTML='<option value="">Error loading</option>'}
  }else{
    dg.style.display='none';
    lg.style.display='block';
  }
}

function openCreateModal(){
  document.getElementById('headRole').value='division_head';
  document.getElementById('headLevelId').value='';
  document.getElementById('headName').value='';
  document.getElementById('headPhone').value='';
  document.getElementById('headPassword').value='';
  document.getElementById('createHeadError').textContent='';
  document.getElementById('credentialsBox').style.display='none';
  document.getElementById('districtSelectGroup').style.display='none';
  document.getElementById('headLevelId').closest('.form-group').style.display='none';
  openModal();
}

async function createHead(){
  const role=document.getElementById('headRole').value;
  const levelId=document.getElementById('headLevelId').value.trim();
  const name=document.getElementById('headName').value.trim();
  const phone=document.getElementById('headPhone').value.trim();
  const password=document.getElementById('headPassword').value;
  const errEl=document.getElementById('createHeadError');
  const btn=document.getElementById('createHeadBtn');
  errEl.textContent='';
  if(role!=='division_head'&&!levelId){errEl.textContent='Level ID is required';return}
  if(!name){errEl.textContent='Name is required';return}
  if(!phone||phone.length!==10||!/^\d+$/.test(phone)){errEl.textContent='Enter valid 10-digit phone';return}
  if(password.length<6){errEl.textContent='Password must be at least 6 characters';return}
  btn.disabled=true;btn.textContent='Creating...';
  try{
    const email=phone+'@ngo.local';
    const cred=await auth.createUserWithEmailAndPassword(email,password);
    const userData={name:name,phone:phone,email:email,role:role,levelId:role==='division_head'?'1':levelId,levelType:role==='division_head'?'division':role==='district_head'?'district':'area',createdBy:currentUser.id||currentUser.uid||'system',createdByName:currentUser.name||'Admin',createdAt:new Date().toISOString()};
    if(role==='area_head'){
      userData.districtId=document.getElementById('headDistrict').value;
      if(!userData.districtId){errEl.textContent='Select a district';btn.disabled=false;btn.textContent='Create';return}
    }
    await db.collection('users').doc(cred.user.uid).set(userData);
    const roleLabels={division_head:'Admin',district_head:'District Head',area_head:'Area Head'};
    document.getElementById('credentialsBox').style.display='block';
    document.getElementById('credentialsBox').innerHTML=`<div class="credentials-box"><h4>User Created Successfully!</h4><p><b>Email:</b> ${escapeHtml(email)}<br><b>Password:</b> ${escapeHtml(password)}<br><b>Role:</b> ${escapeHtml(roleLabels[role]||role)}<br>${role!=='division_head'?'<b>Level ID:</b> '+escapeHtml(levelId):''}</p></div>`;
    btn.disabled=false;btn.textContent='Create';
  }catch(e){
    errEl.textContent=e.message;btn.disabled=false;btn.textContent='Create';
  }
}

async function init(){
  await checkSystemAccess('dashboard');
  currentUser=requireAuth();
  if(!currentUser)return;
  buildSidebar(currentUser);
  buildBottomNav(currentUser);
  if(currentUser.role==='division_head')await loadDivisionHeadDashboard(currentUser);
  else if(currentUser.role==='district_head')await loadDistrictHeadDashboard(currentUser);
  else if(currentUser.role==='area_head')await loadAreaHeadDashboard(currentUser);
  else document.getElementById('mainContent').innerHTML='<div class="empty-state"><h3>Unknown Role</h3><p>Contact administrator.</p></div>';
}

init();
</script>
