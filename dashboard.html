<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Dashboard - TSP</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a6b3c;--primary-dark:#0d4a25;--primary-light:#e8f5e9;--danger:#dc3545;--warning:#ff9800;--success:#28a745;--bg:#f0f2f5;--card:#fff;--text:#333;--text-light:#666;--border:#e0e0e0;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;max-width:500px;margin:0 auto}
.hdr{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.menubtn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:8px}
.hdr h1{font-size:18px;font-weight:700;flex:1}
.content{padding:20px 16px 100px}
.sbar-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200}
.sbar{display:none;position:fixed;top:0;left:0;width:280px;height:100%;background:#fff;z-index:300;box-shadow:4px 0 20px rgba(0,0,0,0.15);overflow-y:auto;border-radius:0 14px 14px 0}
.sbar.open{display:block}
.sbar-hdr{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:20px;border-radius:0 14px 0 0}
.sbar-hdr h2{font-size:16px;font-weight:700;margin-bottom:4px}
.sbar-hdr p{font-size:12px;opacity:.8}
.sbar-hdr .rbadge{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:10px;font-size:11px;display:inline-block;margin-top:6px}
.sbar-menu{padding:10px 0}
.sbar-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--text);text-decoration:none;font-size:14px;font-weight:500;transition:all .2s}
.sbar-menu a:hover,.sbar-menu a.active{background:var(--primary-light);color:var(--primary)}
.sbar-menu a i{width:20px;text-align:center;font-size:16px}
.sbar-ft{padding:15px 20px;border-top:1px solid var(--border);margin-top:10px}
.sbar-ft p{font-size:10px;color:var(--text-light);text-align:center}
.lbtn{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--danger);text-decoration:none;font-size:14px;font-weight:600;border-top:1px solid var(--border);margin-top:10px}
.lbtn i{width:20px;text-align:center}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s}
.card:active{transform:scale(0.97)}
.card .ci{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;margin-bottom:8px}
.card .ci.g{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
.card .ci.b{background:linear-gradient(135deg,#1976d2,#0d47a1)}
.card .ci.p{background:linear-gradient(135deg,#7b1fa2,#4a148c)}
.card .ci.r{background:linear-gradient(135deg,var(--danger),#a71d2a)}
.card .ci.o{background:linear-gradient(135deg,var(--warning),#e65100)}
.card .ci.gr{background:linear-gradient(135deg,var(--success),#1b5e20)}
.card h3{font-size:24px;font-weight:800;color:var(--text)}
.card p{font-size:12px;color:var(--text-light);font-weight:500}
.sec{font-size:16px;font-weight:700;color:var(--text);margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.act-item{background:#fff;border-radius:12px;padding:12px 16px;box-shadow:var(--shadow);margin-bottom:8px;display:flex;align-items:center;gap:12px}
.act-item .ai{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.act-item .ai.g{background:var(--primary-light);color:var(--primary)}
.act-item .ai.b{background:#e3f2fd;color:#1976d2}
.act-item .ai.r{background:#ffebee;color:var(--danger)}
.act-item .ai.o{background:#fff3e0;color:var(--warning)}
.act-item .at{flex:1;font-size:13px;color:var(--text)}
.act-item .at small{color:var(--text-light);font-size:11px;display:block}
.appr-card{background:#fff;border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:8px;border-left:4px solid var(--warning)}
.appr-card h4{font-size:14px;font-weight:600;color:var(--text)}
.appr-card p{font-size:12px;color:var(--text-light)}
.ann-card{border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:8px;position:relative}
.ann-card.normal{background:#e8f5e9;border-left:4px solid var(--success)}
.ann-card.warning{background:#fff3e0;border-left:4px solid var(--warning)}
.ann-card.urgent{background:#ffebee;border-left:4px solid var(--danger)}
.ann-card h4{font-size:14px;font-weight:600;padding-right:60px}
.ann-card p{font-size:12px;color:var(--text-light);margin-top:4px}
.ann-actions{position:absolute;top:12px;right:12px;display:flex;gap:8px}
.ann-actions button{background:none;border:none;cursor:pointer;font-size:13px;padding:2px}
.ann-actions .edit-btn{color:var(--primary)}
.ann-actions .del-btn{color:var(--danger)}
.pbar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:6px}
.pbar .fill{height:100%;border-radius:4px;transition:width .5s}
.pbar .fill.g{background:var(--success)}
.pbar .fill.o{background:var(--warning)}
.pbar .fill.r{background:var(--danger)}
.cov-card{background:#fff;border-radius:12px;padding:14px;box-shadow:var(--shadow);margin-bottom:10px}
.cov-card h4{font-size:14px;font-weight:600;margin-bottom:4px}
.cov-card .pct{font-size:12px;color:var(--text-light)}
.empty{text-align:center;padding:30px;color:var(--text-light)}
.empty i{font-size:40px;color:var(--border);margin-bottom:10px}
.btn-sm{padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-g{background:var(--primary);color:#fff}
.btn-o{background:var(--warning);color:#fff}
.btn-r{background:var(--danger);color:#fff}
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:400;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;animation:su .3s}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--primary-dark)}
.fg{margin-bottom:14px}
.fg label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
.fg input,.fg textarea,.fg select{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#f8f9fa}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--primary);background:#fff}
.macts{display:flex;gap:10px;margin-top:16px}
.macts .btn-sm{flex:1;padding:10px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--primary-dark);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:9999;display:none}
.toast.err{background:var(--danger)}
</style>
</head>
<body>
<div class="sbar-ov" id="sbarOv" onclick="closeSbar()"></div>
<div class="sbar" id="sbar">
<div class="sbar-hdr"><h2 id="sName">User</h2><p id="sPhone"></p><span class="rbadge" id="sRole"></span></div>
<div class="sbar-menu" id="sMenu"></div>
<a href="index.html" class="lbtn" onclick="localStorage.removeItem('currentUser')"><i class="fas fa-sign-out-alt"></i> Logout</a>
<div class="sbar-ft"><p><i class="fas fa-code"></i> A.A.Q. Solutions & Outsourcing</p></div>
</div>
<header class="hdr"><button class="menubtn" onclick="openSbar()"><i class="fas fa-bars"></i></button><h1><i class="fas fa-tachometer-alt"></i> Dashboard</h1></header>
<div class="content" id="content">
<div class="cards" id="statCards"></div>
<div class="sec"><i class="fas fa-chart-pie"></i> Coverage Summary</div>
<div id="coverageArea"></div>
<div class="sec"><i class="fas fa-history"></i> Recent Activity</div>
<div id="activityArea"></div>
<div class="sec"><i class="fas fa-clock"></i> Pending Approvals <button class="btn-sm btn-g" style="margin-left:auto" onclick="location.href='approvals.html'">View All</button></div>
<div id="apprArea"></div>
<div class="sec"><i class="fas fa-bullhorn"></i> Announcements</div>
<div id="annArea"></div>
</div>
<div class="modal-ov" id="annModal" onclick="if(event.target===this)this.classList.remove('open')">
<div class="modal" onclick="event.stopPropagation()">
<h2 id="annTitle">Add Announcement</h2>
<input type="hidden" id="annEditId">
<div class="fg"><label>Title *</label><input type="text" id="annTitleInp" placeholder="Title"></div>
<div class="fg"><label>Message *</label><textarea id="annMsgInp" rows="3" placeholder="Message"></textarea></div>
<div class="fg"><label>Type</label><select id="annTypeInp"><option value="normal">Normal</option><option value="warning">Warning</option><option value="urgent">Urgent</option></select></div>
<div class="macts">
<button class="btn-sm" style="background:var(--border);color:var(--text)" onclick="document.getElementById('annModal').classList.remove('open')">Cancel</button>
<button class="btn-sm btn-g" onclick="saveAnn()"><i class="fas fa-save"></i> Save</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.appspot.com",messagingSenderId:"489310613218",appId:"1:489310613218:web:e44e61cf16d4b8c106729d"};
if(!firebase.apps.length)firebase.initializeApp(FC);
const db=firebase.firestore();
let CU=null;

function reqAuth(){const u=JSON.parse(localStorage.getItem("currentUser")||"null");if(!u||!u.phone){window.location.href="index.html";return null;}CU=u;return u;}
function openSbar(){if(!CU)return;document.getElementById("sName").textContent=CU.name||"User";document.getElementById("sPhone").textContent=CU.phone||"";document.getElementById("sRole").textContent=CU.role==="division_head"?"Division Head":CU.role==="district_head"?"District Head":CU.role==="area_head"?"Area Head":CU.role||"";const m=document.getElementById("sMenu");m.innerHTML=`<a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a><a href="structure.html"><i class="fas fa-sitemap"></i> Tanzeemi Structure</a><a href="persons.html"><i class="fas fa-users"></i> People / Zimmedaran</a><a href="departments.html"><i class="fas fa-building"></i> Departments</a><a href="approvals.html"><i class="fas fa-check-double"></i> Approvals</a><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a><a href="admin.html"><i class="fas fa-cog"></i> Admin & Settings</a>`;document.getElementById("sbar").classList.add("open");document.getElementById("sbarOv").style.display="block";}
function closeSbar(){document.getElementById("sbar").classList.remove("open");document.getElementById("sbarOv").style.display="none";}
function toast(m,e){const t=document.getElementById("toast");t.textContent=m;t.className=e?"toast err":"toast";t.style.display="block";setTimeout(()=>t.style.display="none",3000);}

const stats=[
{id:"persons",label:"Total Persons",icon:"fa-users",color:"g",coll:"persons"},
{id:"active",label:"Active Persons",icon:"fa-user-check",color:"gr",coll:"persons",field:"status",val:"active"},
{id:"inactive",label:"Inactive Persons",icon:"fa-user-times",color:"r",coll:"persons",field:"status",val:"inactive"},
{id:"depts",label:"Total Departments",icon:"fa-building",color:"b",coll:"departments"},
{id:"districts",label:"Total Districts",icon:"fa-map-marker-alt",color:"g",coll:"districts"},
{id:"areas",label:"Total Areas",icon:"fa-map",color:"b",coll:"areas"},
{id:"zh",label:"Total Zeli Halqas",icon:"fa-layer-group",color:"p",coll:"zeli_halqas"},
{id:"vacant",label:"Vacant Positions",icon:"fa-user-minus",color:"o",coll:"dept_staff",field:"personId",val:""},
{id:"appr",label:"Pending Approvals",icon:"fa-clock",color:"r",coll:"approvals",field:"status",val:"pending"}
];

async function loadStats(){
const c=document.getElementById("statCards");c.innerHTML="";
for(const s of stats){
try{
let q;
if(s.field!==undefined){q=await db.collection(s.coll).where(s.field,"==",s.val).get();}
else{q=await db.collection(s.coll).get();}
const count=q.size;
const links={persons:"persons.html",active:"persons.html",inactive:"persons.html",depts:"departments.html",districts:"structure.html",areas:"structure.html",zh:"structure.html",vacant:"departments.html",appr:"approvals.html"};
c.innerHTML+=`<div class="card" onclick="location.href='${links[s.id]||"#"}'"><div class="ci ${s.color}"><i class="fas ${s.icon}"></i></div><h3>${count}</h3><p>${s.label}</p></div>`;
}catch(e){c.innerHTML+=`<div class="card"><div class="ci ${s.color}"><i class="fas ${s.icon}"></i></div><h3>0</h3><p>${s.label}</p></div>`;}
}
}

async function loadCoverage(){
const a=document.getElementById("coverageArea");a.innerHTML='<div style="text-align:center;padding:10px;color:var(--text-light)"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
try{
const[personsSnap,deptsSnap,staffSnap]=await Promise.all([db.collection("persons").get(),db.collection("departments").get(),db.collection("dept_staff").get()]);
const totalP=personsSnap.size,activeP=personsSnap.docs.filter(d=>d.data().status==="active").length;
const totalD=deptsSnap.size,filled=staffSnap.docs.filter(d=>d.data().personId).length,vacant=staffSnap.size-filled;
const hierPct=totalP>0?Math.round((activeP/totalP)*100):0;
const deptPct=staffSnap.size>0?Math.round((filled/staffSnap.size)*100):0;
a.innerHTML=`
<div class="cov-card"><h4>Hierarchy Coverage</h4><p class="pct">${hierPct}%</p><div class="pbar"><div class="fill ${hierPct>70?"g":hierPct>40?"o":"r"}" style="width:${hierPct}%"></div></div></div>
<div class="cov-card"><h4>Department Coverage</h4><p class="pct">${deptPct}%</p><div class="pbar"><div class="fill ${deptPct>70?"g":deptPct>40?"o":"r"}" style="width:${deptPct}%"></div></div></div>
<div class="cov-card"><h4>Filled / Vacant Positions</h4><p class="pct">${filled} Filled / ${vacant} Vacant</p><div class="pbar"><div class="fill g" style="width:${staffSnap.size>0?(filled/staffSnap.size*100):0}%"></div></div></div>
`;
}catch(e){a.innerHTML='<div class="empty"><i class="fas fa-chart-pie"></i><p>Coverage data unavailable</p></div>';}
}

async function loadActivity(){
const a=document.getElementById("activityArea");
try{
const snap=await db.collection("person_history").orderBy("createdAt","desc").limit(10).get();
if(snap.empty){a.innerHTML='<div class="empty"><i class="fas fa-history"></i><p>No recent activity</p></div>';return;}
const icons={created:["fa-plus-circle","g"],updated:["fa-edit","b"],head_changed:["fa-user-tie","o"],transferred:["fa-exchange-alt","b"],dept_changed:["fa-building","p"],approved:["fa-check-circle","g"]};
a.innerHTML="";
snap.forEach(doc=>{
const d=doc.data();
const[ic,clr]=icons[d.type]||["fa-info-circle","b"];
const dt=d.createdAt?new Date(d.createdAt).toLocaleDateString("en-GB"):"";
a.innerHTML+=`<div class="act-item"><div class="ai ${clr}"><i class="fas ${ic}"></i></div><div class="at">${d.description||d.type||"Activity"}<small>${dt}</small></div></div>`;
});
}catch(e){a.innerHTML='<div class="empty"><i class="fas fa-history"></i><p>No activity</p></div>';}
}

async function loadApprovals(){
const a=document.getElementById("apprArea");
try{
const snap=await db.collection("approvals").where("status","==","pending").limit(5).get();
if(snap.empty){a.innerHTML='<div class="empty"><i class="fas fa-check-double"></i><p>No pending approvals</p></div>';return;}
a.innerHTML="";
snap.forEach(doc=>{
const d=doc.data();
a.innerHTML+=`<div class="appr-card"><h4>${d.requestNumber||doc.id} - ${d.requestType||""}</h4><p>By: ${d.requestedByName||"-"} | ${d.createdAt?new Date(d.createdAt).toLocaleDateString("en-GB"):""}</p></div>`;
});
}catch(e){a.innerHTML='<div class="empty"><i class="fas fa-check-double"></i><p>No pending</p></div>';}
}

async function loadAnnouncements(){
const a=document.getElementById("annArea");
try{
const snap=await db.collection("announcements").orderBy("createdAt","desc").limit(5).get();
let h="";
snap.forEach(doc=>{
const d=doc.data();
let actions = "";
if(CU && CU.role==="division_head"){
    actions = `<div class="ann-actions">
        <button class="edit-btn" onclick="openAnnModal('${doc.id}','${d.title.replace(/'/g, "\\'")}','${d.message.replace(/'/g, "\\'")}','${d.type}')"><i class="fas fa-edit"></i></button>
        <button class="del-btn" onclick="deleteAnn('${doc.id}')"><i class="fas fa-trash"></i></button>
    </div>`;
}
h+=`<div class="ann-card ${d.type||'normal'}">${actions}<h4>${d.title||""}</h4><p>${d.message||""}</p></div>`;
});
if(CU&&CU.role==="division_head"){h+=`<button class="btn-sm btn-g" style="margin-top:10px;width:100%" onclick="openAnnModal()"><i class="fas fa-plus"></i> Add Announcement</button>`;}
a.innerHTML=h||'<div class="empty"><i class="fas fa-bullhorn"></i><p>No announcements</p></div>';
}catch(e){a.innerHTML='<div class="empty"><i class="fas fa-bullhorn"></i><p>No announcements</p></div>';}
}

function openAnnModal(id,title,msg,type){document.getElementById("annTitle").textContent=id?"Edit Announcement":"Add Announcement";document.getElementById("annEditId").value=id||"";document.getElementById("annTitleInp").value=title||"";document.getElementById("annMsgInp").value=msg||"";document.getElementById("annTypeInp").value=type||"normal";document.getElementById("annModal").classList.add("open");}

async function saveAnn(){
const id=document.getElementById("annEditId").value,title=document.getElementById("annTitleInp").value.trim(),msg=document.getElementById("annMsgInp").value.trim(),type=document.getElementById("annTypeInp").value;
if(!title||!msg){toast("Title aur message dalen",true);return;}
try{
if(id){await db.collection("announcements").doc(id).update({title,message:msg,type,updatedAt:new Date().toISOString()});}
else{await db.collection("announcements").add({title,message:msg,type,createdBy:CU.id||CU.uid||"system",createdAt:new Date().toISOString()});}
document.getElementById("annModal").classList.remove("open");
toast("Saved!");
loadAnnouncements();
}catch(e){toast("Error: "+e.message,true);}
}

async function deleteAnn(id){
if(!confirm("Kya aap sach me is Announcement ko delete karna chahte hain?"))return;
try{
await db.collection("announcements").doc(id).delete();
toast("Deleted successfully!");
loadAnnouncements();
}catch(e){toast("Error: "+e.message,true);}
}

window.onload=async()=>{if(!reqAuth())return;await Promise.all([loadStats(),loadCoverage(),loadActivity(),loadApprovals(),loadAnnouncements()]);};
</script>
</body>
</html>
