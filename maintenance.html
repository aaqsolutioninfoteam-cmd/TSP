<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maintenance Mode | Tanzeem Structure Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a6b3c;--dark:#0d4a25;--red:#dc3545;--orange:#ff9800;--success:#28a745;--light:#f5f7fa;--dark-text:#1a1a2e;--gray:#6c757d;--border:#e9ecef;--white:#fff;--radius:14px}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--dark-text);max-width:500px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.header{position:sticky;top:0;z-index:100;background:var(--primary);color:var(--white);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.hamburger{background:none;border:none;color:var(--white);font-size:22px;cursor:pointer;padding:4px}
.header-title{flex:1;font-size:17px;font-weight:700}

.content{padding:16px;padding-bottom:80px}
.card{background:var(--white);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--border)}
.section-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title i{color:var(--primary)}

/* Toggle Switch */
.maint-toggle{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--white);border-radius:var(--radius);margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--border)}
.maint-toggle-left{display:flex;align-items:center;gap:12px}
.maint-toggle-left i{font-size:24px}
.maint-toggle-label h3{font-size:14px;font-weight:700}
.maint-toggle-label p{font-size:12px;color:var(--gray);margin-top:2px}
.big-toggle{position:relative;width:56px;height:30px;flex-shrink:0}
.big-toggle input{opacity:0;width:0;height:0}
.big-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:30px;transition:.3s}
.big-slider:before{content:'';position:absolute;height:24px;width:24px;left:3px;bottom:3px;background:var(--white);border-radius:50%;transition:.3s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.big-toggle input:checked+.big-slider{background:var(--red)}
.big-toggle input:checked+.big-slider:before{transform:translateX(26px)}

/* Status Indicator */
.status-indicator{text-align:center;padding:20px;border-radius:var(--radius);margin-bottom:14px}
.status-indicator.on{background:linear-gradient(135deg,var(--red),#b71c1c);color:var(--white);box-shadow:0 4px 16px rgba(220,53,69,.3)}
.status-indicator.off{background:linear-gradient(135deg,var(--success),#1b5e20);color:var(--white);box-shadow:0 4px 16px rgba(40,167,69,.3)}
.status-indicator .icon{font-size:48px;margin-bottom:8px}
.status-indicator h2{font-size:18px;font-weight:800}
.status-indicator p{font-size:13px;opacity:.8;margin-top:4px}

/* Message Input */
.msg-group{margin-bottom:16px}
.msg-group label{display:block;font-size:13px;font-weight:600;color:var(--dark-text);margin-bottom:6px}
.msg-group textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;resize:vertical;min-height:80px;outline:none;transition:border .2s}
.msg-group textarea:focus{border-color:var(--primary)}

.save-btn{width:100%;padding:14px;border:none;border-radius:var(--radius);background:var(--primary);color:var(--white);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.save-btn:active{transform:scale(.98);opacity:.9}
.save-btn.off-mode{background:var(--red)}

/* Preview */
.preview-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:var(--radius);padding:30px 20px;text-align:center;color:var(--white);margin-bottom:14px}
.preview-card .wrench{font-size:64px;margin-bottom:16px;opacity:.8}
.preview-card h2{font-size:20px;font-weight:800;margin-bottom:8px}
.preview-card p{font-size:14px;opacity:.7;line-height:1.6}
.preview-card .dept{margin-top:16px;font-size:11px;opacity:.4}

/* History */
.history-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.history-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.history-dot.on{background:var(--red)}
.history-dot.off{background:var(--success)}
.history-info{flex:1}
.history-info .h-action{font-size:13px;font-weight:600}
.history-info .h-time{font-size:11px;color:var(--gray);margin-top:2px}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;color:var(--gray);text-decoration:none;font-size:10px;font-weight:600;transition:color .2s}
.bottom-nav a.active,.bottom-nav a:hover{color:var(--primary)}
.bottom-nav a i{font-size:20px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--dark-text);color:var(--white);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--red)}

.loader{display:flex;justify-content:center;padding:30px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200}
.sidebar-overlay.active{display:block}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--white);z-index:300;transition:left 0.3s ease;overflow-y:auto;border-radius:0 var(--radius) var(--radius) 0;box-shadow:2px 0 10px rgba(0,0,0,0.1)}
.sidebar.open{left:0}
.sidebar-header{background:var(--primary);color:var(--white);padding:20px 16px;border-radius:0 var(--radius) 0 0}
.sidebar-header h2{font-size:16px;margin-bottom:4px}
.sidebar-header p{font-size:12px;opacity:0.8}
.sidebar-header .role-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:20px;font-size:11px;margin-top:6px;text-transform:capitalize}
.sidebar-menu{padding:10px 0}
.sidebar-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--dark-text);text-decoration:none;font-size:14px;transition:background 0.2s}
.sidebar-menu a:hover,.sidebar-menu a.active{background:var(--light);color:var(--primary);font-weight:600}
.sidebar-menu a.active{border-right:3px solid var(--primary)}
.sidebar-menu a i{width:22px;text-align:center;font-size:16px;flex-shrink:0}
.sidebar-menu .logout-btn{color:var(--red);border-top:1px solid var(--border);margin-top:6px}
</style>
</head>
<body>

<div class="header">
  <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
  <div class="header-title"><i class="fas fa-wrench" style="margin-right:8px"></i>Maintenance Mode</div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2 id="sidebarName">User</h2>
    <p id="sidebarPhone">-</p>
    <span class="role-badge" id="sidebarRole">-</span>
  </div>
  <div class="sidebar-menu" id="sidebarMenu"></div>
  <div style="padding:16px;font-size:10px;color:rgba(255,255,255,.4);text-align:center;border-top:1px solid rgba(255,255,255,.1);margin-top:auto">Developed by<br><b style="color:rgba(255,255,255,.6)">A.A.Q. Solutions & Outsourcing</b></div>
</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav" id="bottomNav">
  <a href="dashboard.html"><i class="fas fa-home"></i>Home</a>
  <a href="access-control.html"><i class="fas fa-shield-alt"></i>Access</a>
  <a href="maintenance.html" class="active"><i class="fas fa-wrench"></i>Maintain</a>
  <a href="#" onclick="toggleSidebar();return false"><i class="fas fa-ellipsis-h"></i>More</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.firebasestorage.app",messagingSenderId:"438479516590",appId:"1:438479516590:web:fc0a9aaa4a0285f0dc0e3f",measurementId:"G-TJWXZSQXGH"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const menus={division_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Districts',icon:'fa-map',file:'districts.html'},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Departments',icon:'fa-building',file:'departments.html'},{label:'Designations',icon:'fa-id-badge',file:'designations.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Org Tree',icon:'fa-sitemap',file:'org-tree.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'Reports',icon:'fa-chart-bar',file:'reports.html'},{label:'Dept Dashboard',icon:'fa-chart-pie',file:'dept-dashboard.html'},{label:'Access Control',icon:'fa-shield-alt',file:'access-control.html'},{label:'Maintenance',icon:'fa-wrench',file:'maintenance.html'},{label:'Announcements',icon:'fa-bullhorn',file:'announcements.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}],district_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'Reports',icon:'fa-chart-bar',file:'reports.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}],area_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}]};const bottomNavs={division_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Announce',icon:'fa-bullhorn',file:'announcements.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}],district_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}],area_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}]};

async function checkSystemAccess(moduleId){
  try{
    const raw=localStorage.getItem('ngoUser');
    if(!raw)return;
    const user=JSON.parse(raw);
    if(user.role==='division_head')return;
    const settingsSnap=await db.collection('settings').limit(1).get();
    if(!settingsSnap.empty){
      const s=settingsSnap.docs[0].data();
      if(s.maintenanceMode){
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:48px;margin-bottom:16px"><i class="fas fa-tools"></i></div><h1 style="font-size:22px;font-weight:800;margin-bottom:12px">Under Development</h1><p style="font-size:14px;opacity:.7;line-height:1.6">'+(s.maintenanceMessage||'Software under development hai. Please wait karein.')+'</p><p style="font-size:11px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
        throw new Error('maintenance');
      }
    }
    const accessSnap=await db.collection('user_access').where('userId','==',user.id).limit(1).get();
    if(!accessSnap.empty){
      const a=accessSnap.docs[0].data();
      if(a.expiresAt){
        const exp=a.expiresAt.seconds?new Date(a.expiresAt.seconds*1000):new Date(a.expiresAt);
        if(new Date()>exp){
          document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-lock"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Access Expired</h1><p style="font-size:16px;opacity:.7">Aapka access khatam ho gaya hai. Admin se contact karein.</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
          throw new Error('access expired');
        }
      }
      if(a.modules&&a.modules[moduleId]===false){
        window.location.href='dashboard.html';
        throw new Error('no access');
      }
    }
  }catch(e){
    if(e.message==='maintenance'||e.message==='access expired'){}
  }
}

let currentUser=null;
let settingsDocId=null;
let maintenanceEnabled=false;
let maintenanceMessage='';

function requireAuth(roles){
  const raw=localStorage.getItem('ngoUser');
  if(!raw){window.location.href='index.html';return null}
  try{
    const u=JSON.parse(raw);
    if(roles&&!roles.includes(u.role)){window.location.href='dashboard.html';return null}
    return u;
  }catch(e){window.location.href='index.html';return null}
}


function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>{t.className='toast'},3000);
}


async function loadSettings(){
  try{
    const snap=await db.collection('settings').limit(1).get();
    if(!snap.empty){
      const doc=snap.docs[0];
      settingsDocId=doc.id;
      const d=doc.data();
      maintenanceEnabled=d.maintenanceMode||false;
      maintenanceMessage=d.maintenanceMessage||'Software under development hai. Please wait karein. Jaldi aa raha hai!';
    }
  }catch(e){console.error('Load settings error:',e)}
}

function renderPage(){
  const area=document.getElementById('mainContent');
  const previewMsg=maintenanceMessage||'Software under development hai. Please wait karein. Jaldi aa raha hai!';

  area.innerHTML=`
    <div class="status-indicator ${maintenanceEnabled?'on':'off'}">
      <div class="icon">${maintenanceEnabled?'<i class=\"fas fa-lock\"></i>':'<i class=\"fas fa-unlock\"></i>'}</div>
      <h2>${maintenanceEnabled?'MAINTENANCE MODE ON':'System Active'}</h2>
      <p>${maintenanceEnabled?'Sab users ko maintenance message dikh raha hai':'Sab users software use kar rahe hain'}</p>
    </div>

    <div class="maint-toggle">
      <div class="maint-toggle-left">
        <i class="fas fa-power-off" style="color:${maintenanceEnabled?'var(--red)':'var(--gray)'}"></i>
        <div class="maint-toggle-label">
          <h3>${maintenanceEnabled?'Maintenance ON':'Maintenance OFF'}</h3>
          <p>${maintenanceEnabled?'Users software nahi use kar pa rahe':'Normal operation'}</p>
        </div>
      </div>
      <label class="big-toggle">
        <input type="checkbox" id="maintSwitch" ${maintenanceEnabled?'checked':''} onchange="toggleMaintenance(this.checked)">
        <span class="big-slider"></span>
      </label>
    </div>

    <div class="card">
      <div class="section-title"><i class="fas fa-comment-dots"></i>Maintenance Message</div>
      <div class="msg-group">
        <label>Ye message sab users ko dikhega:</label>
        <textarea id="maintMsg" placeholder="Software under development hai. Please wait karein...">${previewMsg}</textarea>
      </div>
      <button class="save-btn" onclick="saveSettings()"><i class="fas fa-save"></i> Save Message</button>
    </div>

    <div class="card">
      <div class="section-title"><i class="fas fa-eye"></i>Preview</div>
      <div class="preview-card">
        <div class="wrench"><i class="fas fa-tools"></i></div>
        <h2>Under Development</h2>
        <p id="previewText">${previewMsg}</p>
        <div class="dept">A.A.Q. Solutions & Outsourcing</div>
      </div>
    </div>
  `;
}

async function toggleMaintenance(enabled){
  maintenanceEnabled=enabled;
  renderPage();
}

async function saveSettings(){
  const msg=document.getElementById('maintMsg').value.trim();
  maintenanceMessage=msg;

  try{
    const data={
      maintenanceMode:maintenanceEnabled,
      maintenanceMessage:msg,
      updatedBy:currentUser.id||currentUser.uid||'admin',
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    };

    if(settingsDocId){
      await db.collection('settings').doc(settingsDocId).update(data);
    }else{
      const ref=await db.collection('settings').add(data);
      settingsDocId=ref.id;
    }

    showToast(maintenanceEnabled?'Maintenance mode ON!':'Maintenance mode OFF!','success');
  }catch(e){
    console.error('Save error:',e);
    showToast('Error: '+e.message,'error');
  }
}

async function init(){
  await checkSystemAccess('maintenance');
  currentUser=requireAuth(['division_head']);
  if(!currentUser)return;
  buildSidebar(currentUser);
  buildBottomNav(currentUser);
  await loadSettings();
  renderPage();
}

init();


function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}
function buildSidebar(user){
  const nameEl=document.getElementById('sidebarName');
  const phoneEl=document.getElementById('sidebarPhone');
  const roleEl=document.getElementById('sidebarRole');
  const avatarEl=document.getElementById('avatarEl');
  if(nameEl)nameEl.textContent=user.name;
  if(phoneEl)phoneEl.textContent=user.phone||'-';
  if(roleEl)roleEl.textContent=user.role.replace(/_/g,' ');
  if(avatarEl)avatarEl.textContent=user.name.charAt(0).toUpperCase();
  const menu=menus[user.role]||[];
  const cont=document.getElementById('sidebarMenu');
  if(!cont)return;
  cont.innerHTML='';
  menu.forEach(m=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+m.icon+'"></i> '+m.label;
    if(m.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      closeSidebar();
      if(m.file==='logout'){localStorage.removeItem('ngoUser');window.location.href='index.html';return}
      if(m.file!=='dashboard.html')window.location.href=m.file;
    };
    if(m.icon==='fa-sign-out-alt')a.classList.add('logout-btn');
    cont.appendChild(a);
  });
}
function buildBottomNav(user){
  const nav=document.getElementById('bottomNav');
  if(!nav)return;
  nav.innerHTML='';
  const items=bottomNavs[user.role]||[];
  items.forEach(b=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+b.icon+'"></i><span>'+b.label+'</span>';
    if(b.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      if(b.file==='sidebar'){toggleSidebar();return}
      if(b.file!=='dashboard.html')window.location.href=b.file;
    };
    nav.appendChild(a);
  });
}
</script>
</body>
</html>
