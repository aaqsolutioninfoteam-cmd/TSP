*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a1a2e;min-height:100vh;max-width:500px;margin:0 auto;overflow-x:hidden}
:root{--primary:#1a6b3c;--dark:#0d4a25;--red:#dc3545;--orange:#ff9800;--success:#28a745;--light:#f5f7fa;--dark-text:#1a1a2e;--gray:#6c757d;--border:#e9ecef;--white:#fff;--radius:14px}

.menu-btn,.back-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px}

.content{padding:16px;padding-bottom:90px}

.action-delete{background:#f8d7da;color:#721c24}
.table-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#e8f5e9;color:#1a6b3c}

.action-buttons{display:flex;gap:6px;flex-wrap:wrap}

.btn-approve{background:#28a745;color:#fff}

.btn-reject{background:#dc3545;color:#fff}

.btn-sendback{background:#ff9800;color:#fff}

.btn-hold{background:#6c757d;color:#fff}

.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.status-approved{background:#d4edda;color:#155724}
.status-rejected{background:#f8d7da;color:#721c24}
.status-sent_back{background:#fff3cd;color:#856404}
.status-hold{background:#e2e3e5;color:#383d41}

.processed-info{font-size:12px;color:#6c757d;margin-top:6px}
.processed-info i{margin-right:4px;color:var(--primary)}
.remarks-box{background:#fff3cd;border:1px solid #ffeeba;border-radius:8px;padding:8px 10px;margin-top:8px;font-size:12px;color:#856404}

.timeline{padding-left:20px;border-left:3px solid var(--primary);margin:10px 0}
.timeline-item{padding:8px 0 8px 12px;position:relative;font-size:12px;color:#6c757d}
.timeline-item::before{content:'';position:absolute;left:-26px;top:12px;width:10px;height:10px;border-radius:50%;background:var(--primary);border:2px solid #fff}
.timeline-item .tl-status{font-weight:700;color:var(--dark-text)}
.timeline-item .tl-date{font-size:11px;color:#6c757d}

.empty-state{text-align:center;padding:40px 20px;color:#6c757d}
.empty-state i{font-size:48px;color:#e9ecef;margin-bottom:12px;display:block}
.empty-state h3{font-size:16px;margin-bottom:6px;color:#6c757d}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;width:100%;max-width:500px;border-radius:14px 14px 0 0;padding:20px 16px 30px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:#e9ecef;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:20px;color:#6c757d;cursor:pointer;padding:4px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:6px}
.form-group textarea,.form-group select{width:100%;padding:12px 14px;border:1px solid #e9ecef;border-radius:10px;font-size:14px;background:#fff;outline:none;transition:border-color .2s;font-family:inherit}
.form-group textarea:focus,.form-group select:focus{border-color:#1a6b3c}
.form-group textarea{resize:vertical;min-height:80px}
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn-row button{flex:1;padding:12px;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel{background:#e9ecef;color:#1a1a2e}
.btn-confirm-reject{background:#dc3545;color:#fff}
.btn-confirm-sendback{background:#ff9800;color:#fff}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;display:flex;border-radius:14px 14px 0 0;box-shadow:0 -2px 12px rgba(0,0,0,.08);z-index:100;border-top:1px solid #e9ecef}
.bottom-nav a{flex:1;padding:10px 0;text-align:center;text-decoration:none;color:#6c757d;font-size:11px;font-weight:500;transition:color .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.bottom-nav a i{font-size:18px}
.bottom-nav a.active{color:#1a6b3c;font-weight:600}

.loading-spinner{display:flex;justify-content:center;align-items:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid #e9ecef;border-top-color:#1a6b3c;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;z-index:5000;animation:toastIn 3s ease forwards;white-space:nowrap}
.toast.success{background:#28a745}
.toast.error{background:#dc3545}
.toast.warning{background:#ff9800}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
</style>

<div class="header">
  <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

<div class="content">

    </div>
    <div class="tab" data-tab="processed" onclick="switchTab('processed')">
      <i class="fas fa-history"></i> Processed
    </div>
    <div class="tab" data-tab="myrequests" onclick="switchTab('myrequests')">
      <i class="fas fa-paper-plane"></i> My Requests
    </div>

  <!-- PENDING TAB -->
  <div class="tab-content active" id="tab-pending">

      <button onclick="setProcessedFilter('approved',this)">Approved</button>
      <button onclick="setProcessedFilter('rejected',this)">Rejected</button>
      <button onclick="setProcessedFilter('sent_back',this)">Sent Back</button>
      <button onclick="setProcessedFilter('hold',this)">On Hold</button>

    <div id="processedList"><div class="loading-spinner"><div class="spinner"></div></div></div>

  </div>
</div>

<!-- REJECT MODAL -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span><i class="fas fa-times-circle" style="color:#dc3545;margin-right:6px"></i> Reject Request</span>
      <button class="modal-close" onclick="closeRejectModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-group">
      <label>Rejection Reason <span style="color:#dc3545">*</span></label>
      <textarea id="rejectReason" placeholder="Reason for rejection..."></textarea>

      <button class="btn-cancel" onclick="closeRejectModal()">Cancel</button>
      <button class="btn-confirm-reject" onclick="confirmReject()">Reject</button>
    </div>
  </div>
</div>

<!-- SEND BACK MODAL -->
<div class="modal-overlay" id="sendBackModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span><i class="fas fa-undo" style="color:#ff9800;margin-right:6px"></i> Send Back Request</span>
      <button class="modal-close" onclick="closeSendBackModal()"><i class="fas fa-times"></i></button>

      </select>

      <button class="btn-cancel" onclick="closeSendBackModal()">Cancel</button>

</div>

const firebaseConfig={apiKey:"AIzaSyBx7UCuhxtgXIKmh9ocGUN_MQktsIN610M",authDomain:"information-1d471.firebaseapp.com",projectId:"information-1d471",storageBucket:"information-1d471.firebasestorage.app",messagingSenderId:"438479516590",appId:"1:438479516590:web:fc0a9aaa4a0285f0dc0e3f",measurementId:"G-TJWXZSQXGH"};

const menus={division_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Districts',icon:'fa-map',file:'districts.html'},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Departments',icon:'fa-building',file:'departments.html'},{label:'Designations',icon:'fa-id-badge',file:'designations.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Org Tree',icon:'fa-sitemap',file:'org-tree.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'Reports',icon:'fa-chart-bar',file:'reports.html'},{label:'Dept Dashboard',icon:'fa-chart-pie',file:'dept-dashboard.html'},{label:'Access Control',icon:'fa-shield-alt',file:'access-control.html'},{label:'Maintenance',icon:'fa-wrench',file:'maintenance.html'},{label:'Announcements',icon:'fa-bullhorn',file:'announcements.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}],district_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'Reports',icon:'fa-chart-bar',file:'reports.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}],area_head:[{label:'Dashboard',icon:'fa-tachometer-alt',file:'dashboard.html',active:true},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'Persons',icon:'fa-users',file:'persons.html'},{label:'Logout',icon:'fa-sign-out-alt',file:'logout'}]};const bottomNavs={division_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Announce',icon:'fa-bullhorn',file:'announcements.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}],district_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Areas',icon:'fa-map-marker-alt',file:'areas.html'},{label:'Approvals',icon:'fa-check-double',file:'approvals.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}],area_head:[{label:'Home',icon:'fa-home',file:'dashboard.html',active:true},{label:'Zeli Halqas',icon:'fa-layer-group',file:'zeli-halqas.html'},{label:'More',icon:'fa-ellipsis-h',file:'sidebar'}]};function buildSidebar(user){var n=document.getElementById('sidebarName');if(n)n.textContent=user.name;var p=document.getElementById('sidebarPhone');if(p)p.textContent=user.phone;var r=document.getElementById('sidebarRole');if(r)r.textContent=user.role.replace(/_/g,' ');var a=document.getElementById('avatarEl');if(a)a.textContent=user.name.charAt(0).toUpperCase();var menu=menus[user.role]||[];var cont=document.getElementById('sidebarMenu')||document.getElementById('sidebarNav');if(!cont)return;cont.innerHTML='';menu.forEach(function(m){var el=document.createElement('a');el.href='#';el.innerHTML='<i class="fas '+m.icon+'"></i> '+m.label;if(m.active)el.classList.add('active');el.onclick=function(e){e.preventDefault();closeSidebar();if(m.file==='logout'){localStorage.removeItem('ngoUser');window.location.href='index.html';return}if(m.file!=='dashboard.html')window.location.href=m.file};if(m.icon==='fa-sign-out-alt')el.classList.add('logout-btn');cont.appendChild(el)})}function buildBottomNav(user){var nav=document.getElementById('bottomNav');if(!nav)return;nav.innerHTML='';var items=bottomNavs[user.role]||[];items.forEach(function(b){var el=document.createElement('a');el.href='#';el.innerHTML='<i class="fas '+b.icon+'"></i><span>'+b.label+'</span>';if(b.active)el.classList.add('active');el.onclick=function(e){e.preventDefault();if(b.file==='sidebar'){toggleSidebar();return}if(b.file!=='dashboard.html')window.location.href=b.file};nav.appendChild(el)})}function closeSidebar(){var s=document.getElementById('sidebar');if(s)s.classList.remove( async function checkSystemAccess(moduleId){
  try{
    const raw=localStorage.getItem('ngoUser');
    if(!raw)return;
    const user=JSON.parse(raw);
    if(user.role==='division_head')return;
    const settingsSnap=await db.collection('settings').limit(1).get();
    if(!settingsSnap.empty){
      const s=settingsSnap.docs[0].data();
      if(s.maintenanceMode){
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-tools"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Under Development</h1><p style="font-size:16px;opacity:.7;line-height:1.6">'+(s.maintenanceMessage||'Software under development hai. Please wait karein.')+'</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
        throw new Error('maintenance');
      }
    }
    const accessSnap=await db.collection('user_access').where('userId','==',user.id).limit(1).get();
    if(!accessSnap.empty){
      const a=accessSnap.docs[0].data();
      if(a.expiresAt){
        const exp=a.expiresAt.seconds?new Date(a.expiresAt.seconds*1000):new Date(a.expiresAt);
        if(new Date()>exp){
          document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-lock"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Access Expired</h1><p style="font-size:16px;opacity:.7">Aapka access khatam ho gaya hai. Admin se contact karein.</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
          throw new Error('access expired');
        }
      }
      if(a.modules&&a.modules[moduleId]===false){
        window.location.href='dashboard.html';
        throw new Error('no access');
      }
    }
  }catch(e){
    if(e.message==='maintenance'||e.message==='access expired'){}
  }
}

let currentUser=null;
let userRole='';
let pendingApprovals=[];
let processedApprovals=[];
let myRequests=[];
let currentProcessedFilter='all';
let currentActionId=null;

function requireAuth(roles){
  const raw=localStorage.getItem('ngoUser');
  if(!raw){window.location.href='index.html';return null}
  try{
    const u=JSON.parse(raw);
    if(!roles||roles.includes(u.role))return u;
    window.location.href='dashboard.html';
    return null;
  }catch(e){window.location.href='index.html';return null}
}

function escHtml(s){
  if(!s)return '';
  const d=document.createElement('div');
  d.textContent=String(s);
  return d.innerHTML;
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

function showToast(msg,type){
  const t=document.createElement('div');
  t.className='toast '+(type||'success');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-tab="'+tab+'"]').classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='pending')filterPending();
  if(tab==='processed')filterProcessed();
  if(tab==='myrequests')renderMyRequests();
}



function autoRequestNumber(idx){
  return 'REQ-'+String(idx).padStart(4,'0');
}

function getActionBadge(action){
  const cls={create:'action-create',update:'action-update',delete:'action-delete'};
  const label={create:'Create',update:'Update',delete:'Delete'};
  return '<span class="action-badge '+(cls[action]||'action-create')+'">'+(label[action]||action)+'</span>';
}

function getTableBadge(table){
  const labels={areas:'Area',districts:'District',zeli_halqas:'Zeli Halqa',departments:'Department',persons:'Person',designations:'Designation'};
  return '<span class="table-badge">'+(labels[table]||table)+'</span>';
}
function getApprovalTable(a){return a.collection||a.table||'';}
function getApprovalAction(a){
  var t=a.type||a.action||'';
  if(t.indexOf('create')!==-1)return'create';
  if(t.indexOf('edit')!==-1||t.indexOf('update')!==-1)return'update';
  if(t.indexOf('delete')!==-1)return'delete';
  return a.docId?(a.data||a.newData?'update':'delete'):'create';
}
function getApprovalData(a){return a.data||a.newData||{};}

function getStatusBadge(status){
  const cls={approved:'status-approved',rejected:'status-rejected',sent_back:'status-sent_back',hold:'status-hold'};
  const label={approved:'Approved',rejected:'Rejected',sent_back:'Sent Back',hold:'On Hold'};
  return '<span class="status-badge '+(cls[status]||'')+'">'+(label[status]||status)+'</span>';
}

function formatDate(ts){
  if(!ts)return '';
  let d;
  if(ts.seconds)d=new Date(ts.seconds*1000);
  else if(typeof ts==='string')d=new Date(ts);
  else if(ts instanceof Date)d=ts;
  else return '';
  if(isNaN(d.getTime()))return '';
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function parseDetail(data,table){
  if(!data)return '<p style="font-size:12px;color:#6c757d">No details available</p>';
  let html='';
  if(table==='areas'||table==='districts'){
    html+=dRow('Name',data.name);
    if(data.headName)html+=dRow('Head',data.headName);
    if(data.headPhone)html+=dRow('Phone',data.headPhone);
    if(data.code)html+=dRow('Code',data.code);
    if(data.description)html+=dRow('Description',data.description);
  }else if(table==='zeli_halqas'){
    html+=dRow('Masjid',data.masjidName||data.name);
    if(data.halqaHeadName)html+=dRow('Halqa Head',data.halqaHeadName);
    if(data.halqaHeadPhone)html+=dRow('Head Phone',data.halqaHeadPhone);
    if(data.imamName)html+=dRow('Imam',data.imamName);
    if(data.imamPhone)html+=dRow('Imam Phone',data.imamPhone);
    if(data.address)html+=dRow('Address',data.address);
    if(data.description)html+=dRow('Description',data.description);
  }else if(table==='departments'){
    html+=dRow('Name',data.name);
    if(data.head)html+=dRow('Head',data.head);
    if(data.scope)html+=dRow('Scope',data.scope);
    if(data.description)html+=dRow('Description',data.description);
  }else if(table==='persons'){
    html+=dRow('Name',data.name);
    if(data.fatherName)html+=dRow('Father Name',data.fatherName);
    if(data.phone)html+=dRow('Phone',data.phone);
    if(data.email)html+=dRow('Email',data.email);
    if(data.designationName)html+=dRow('Designation',data.designationName);
    if(data.status)html+=dRow('Status',data.status);
    if(data.areaName)html+=dRow('Area',data.areaName);
    if(data.districtName)html+=dRow('District',data.districtName);
    if(data.primaryDeptName)html+=dRow('Department',data.primaryDeptName);
    if(data.remarks)html+=dRow('Remarks',data.remarks);
  }else if(table==='designations'){
    html+=dRow('Name',data.name);
    if(data.description)html+=dRow('Description',data.description);
    if(data.level)html+=dRow('Level',data.level);
  }else{
    for(const k in data){
      if(data[k]&&typeof data[k]==='string')html+=dRow(k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()),data[k]);
    }
  }
  return html||'<p style="font-size:12px;color:#6c757d">No details</p>';
}

function dRow(label,value){
  if(!value)return '';
  return '<div class="detail-row"><span class="dlabel">'+escHtml(label)+'</span><span class="dvalue">'+escHtml(value)+'</span></div>';
}

function renderPendingCards(list){
  const c=document.getElementById('pendingList');
  if(!list||list.length===0){
    c.innerHTML='<div class="empty-state"><i class="fas fa-check-double"></i><h3>Koi pending approval nahi</h3><p>Sab approvals process ho gaye hain.</p></div>';
    return;
  }
  let html='';
  list.forEach((a,i)=>{
    const reqNum=autoRequestNumber(a._reqIdx||i+1);
    const nd=parseDetail(getApprovalData(a),getApprovalTable(a));
    html+='<div class="approval-card fade-in">';
    html+='<div class="approval-top">';
    html+='<span class="approval-req">'+escHtml(reqNum)+'</span>';
    html+='<div class="approval-date">'+formatDate(a.createdAt)+'</div>';
    html+='</div>';
    html+='<div class="approval-badges">'+getActionBadge(getApprovalAction(a))+getTableBadge(getApprovalTable(a))+'</div>';
    html+='<div class="submitted-by"><i class="fas fa-user"></i> Submitted by: <strong>'+escHtml(a.requestedByName||'Unknown')+'</strong></div>';
    html+='<div class="detail-box"><h4><i class="fas fa-info-circle"></i> Request Details</h4>'+nd+'</div>';
    html+='<div class="action-buttons">';
    html+='<button class="btn-approve" onclick="doApprove(\''+a.id+'\')"><i class="fas fa-check"></i> Approve</button>';
    html+='<button class="btn-reject" onclick="openRejectModal(\''+a.id+'\')"><i class="fas fa-times"></i> Reject</button>';
    html+='<button class="btn-sendback" onclick="openSendBackModal(\''+a.id+'\')"><i class="fas fa-undo"></i> Send Back</button>';
    html+='<button class="btn-hold" onclick="doHold(\''+a.id+'\')"><i class="fas fa-pause"></i> Hold</button>';
    html+='</div></div>';
  });
  c.innerHTML=html;
}

function filterPending(){
  const q=(document.getElementById('pendingSearch').value||'').toLowerCase();
  let filtered=pendingApprovals;
  if(q){
    filtered=filtered.filter(a=>{
      const nd=getApprovalData(a);
      return (a.requestedByName||'').toLowerCase().includes(q)||
        (getApprovalTable(a)||'').toLowerCase().includes(q)||
        (getApprovalAction(a)||'').toLowerCase().includes(q)||
        (nd.name||'').toLowerCase().includes(q)||
        (nd.masjidName||'').toLowerCase().includes(q);
    });
  }
  renderPendingCards(filtered);
}

function renderProcessedList(list){
  const c=document.getElementById('processedList');
  if(!list||list.length===0){
    c.innerHTML='<div class="empty-state"><i class="fas fa-history"></i><h3>Koi processed approval nahi</h3><p>Abhi tak koi request process nahi hui.</p></div>';
    return;
  }
  let html='';
  list.forEach((a,i)=>{
    const reqNum=autoRequestNumber(a._reqIdx||i+1);
    let remarksHtml='';
    if(a.remarks&&(a.status==='rejected'||a.status==='sent_back')){
      remarksHtml='<div class="remarks-box"><i class="fas fa-comment-dots"></i> '+escHtml(a.remarks)+'</div>';
    }
    html+='<div class="approval-card fade-in">';
    html+='<div class="approval-top">';
    html+='<span class="approval-req">'+escHtml(reqNum)+'</span>';
    html+=getStatusBadge(a.status);
    html+='</div>';
    html+='<div class="approval-badges">'+getActionBadge(getApprovalAction(a))+getTableBadge(getApprovalTable(a))+'</div>';
    html+='<div class="submitted-by"><i class="fas fa-user"></i> Submitted by: <strong>'+escHtml(a.requestedByName||'Unknown')+'</strong></div>';
    html+='<div class="processed-info"><i class="fas fa-user-check"></i> Processed by: <strong>'+escHtml(a.approvedByName||'Unknown')+'</strong> on '+formatDate(a.approvedAt)+'</div>';
    html+=remarksHtml;
    html+='</div>';
  });
  c.innerHTML=html;

function filterProcessed(){
  const q=(document.getElementById('processedSearch').value||'').toLowerCase();
  let filtered=processedApprovals;
  if(currentProcessedFilter!=='all'){
    filtered=filtered.filter(a=>a.status===currentProcessedFilter);
  }
  if(q){
    filtered=filtered.filter(a=>{
      const nd=getApprovalData(a);
      return (a.requestedByName||'').toLowerCase().includes(q)||
        (a.approvedByName||'').toLowerCase().includes(q)||
        (getApprovalTable(a)||'').toLowerCase().includes(q)||
        (getApprovalAction(a)||'').toLowerCase().includes(q)||
        (nd.name||'').toLowerCase().includes(q);
    });
  }
  renderProcessedList(filtered);
}

function setProcessedFilter(f,btn){
  currentProcessedFilter=f;
  document.querySelectorAll('#processedFilters button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterProcessed();
}

async function doApprove(id){
  try{
    const snap=await db.collection('approvals').doc(id).get();
    if(!snap.exists){showToast('Approval not found','error');return;}
    const a=snap.data();
    const table=getApprovalTable(a);
    const action=getApprovalAction(a);
    const nd=getApprovalData(a);
    const docId=a.docId;

    if(action==='create'){
      const saveData={...nd,createdAt:firebase.firestore.FieldValue.serverTimestamp(),status:nd.status||'active'};
      await db.collection(table).add(saveData);
    }else if(action==='update'){
      if(docId){
        await db.collection(table).doc(docId).update(nd);
      }
    }else if(action==='delete'){
      if(docId){
        await db.collection(table).doc(docId).update({status:'deleted'});
      }
    }

    await db.collection('approvals').doc(id).update({
      status:'approved',
      approvedBy:currentUser.id||currentUser.uid,
      approvedByName:currentUser.name||'Unknown',
      approvedAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    showToast('Request approved successfully!','success');
    await loadAllApprovals();
  }catch(e){
    console.error('Approve error:',e);
    showToast('Error approving: '+e.message,'error');
  }
}

function openRejectModal(id){
  currentActionId=id;
  document.getElementById('rejectReason').value='';
  document.getElementById('rejectModal').classList.add('show');
}

function closeRejectModal(){
  document.getElementById('rejectModal').classList.remove('show');
  currentActionId=null;
}

async function confirmReject(){
  if(!currentActionId)return;
  const reason=document.getElementById('rejectReason').value.trim();
  if(!reason){showToast('Rejection reason is required','error');return;}
  try{
    await db.collection('approvals').doc(currentActionId).update({
      status:'rejected',
      approvedBy:currentUser.id||currentUser.uid,
      approvedByName:currentUser.name||'Unknown',
      remarks:reason,
      approvedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('Request rejected.','success');
    closeRejectModal();
    await loadAllApprovals();
  }catch(e){
    console.error('Reject error:',e);
    showToast('Error: '+e.message,'error');
  }
}

async function loadAllApprovals(){
  try{
    let pendingSnap, processedSnap, mySnap;
    const pendingIds=[];
    const processedIds=[];

    if(userRole==='division_head'){
      pendingSnap=await db.collection('approvals')
        .where('levelId','==',currentUser.levelId)
        .get();
      const allPending=[];
      pendingSnap.forEach(d=>{
        const dd=d.data();
        if(dd.status==='pending')allPending.push({id:d.id,...dd});
      });
      allPending.sort((a,b)=>{
        const ta=a.createdAt&&a.createdAt.seconds?a.createdAt.seconds:0;
        const tb=b.createdAt&&b.createdAt.seconds?b.createdAt.seconds:0;
        return tb-ta;
      });

      const allProcessed=[];
      pendingSnap.forEach(d=>{
        const dd=d.data();
        if(dd.status&&dd.status!=='pending')allProcessed.push({id:d.id,...dd});
      });

      mySnap=await db.collection('approvals')
        .where('requestedBy','==',currentUser.id||currentUser.uid||'')
        .get();
    }else if(userRole==='district_head'){
      const [ps1,ps2]=await Promise.all([
        db.collection('approvals')
          .where('levelId','==',currentUser.levelId)
          .get(),
        db.collection('approvals')
          .where('requestedBy','==',currentUser.id||currentUser.uid||'')
          .get()
      ]);
      const seenIds=new Set();
      const mergedPending=[];
      ps1.forEach(d=>{const dd=d.data();if(dd.status==='pending'&&!seenIds.has(d.id)){seenIds.add(d.id);mergedPending.push({id:d.id,...dd})}});
      ps2.forEach(d=>{const dd=d.data();if(dd.status==='pending'&&!seenIds.has(d.id)){seenIds.add(d.id);mergedPending.push({id:d.id,...dd})}});
      mergedPending.sort((a,b)=>{
        const ta=a.createdAt&&a.createdAt.seconds?a.createdAt.seconds:0;
        const tb=b.createdAt&&b.createdAt.seconds?b.createdAt.seconds:0;
        return tb-ta;
      });

      const seenP=new Set();
      const mergedProcessed=[];
      ps1.forEach(d=>{const dd=d.data();if(dd.status&&dd.status!=='pending'&&!seenP.has(d.id)){seenP.add(d.id);mergedProcessed.push({id:d.id,...dd})}});
      ps2.forEach(d=>{const dd=d.data();if(dd.status&&dd.status!=='pending'&&!seenP.has(d.id)){seenP.add(d.id);mergedProcessed.push({id:d.id,...dd})}});

      pendingApprovals=mergedPending;
      processedApprovals=mergedProcessed;
      mySnap=await db.collection('approvals')
        .where('requestedBy','==',currentUser.id||currentUser.uid||'')
        .get();
    }else{
      mySnap=await db.collection('approvals')
        .where('requestedBy','==',currentUser.id||currentUser.uid||'')
        .get();
      pendingApprovals=[];
      processedApprovals=[];
    }

    if(userRole==='division_head'){
      pendingApprovals=[];
      pendingSnap.forEach(d=>pendingApprovals.push({id:d.id,...d.data()}));

      processedApprovals=[];
      processedSnap.forEach(d=>processedApprovals.push({id:d.id,...d.data()}));
    }

    myRequests=[];
    if(mySnap){
      mySnap.forEach(d=>myRequests.push({id:d.id,...d.data()}));
    }

    let reqIdx=1;
    const allApprovals=[...pendingApprovals,...processedApprovals,...myRequests];
    const idxMap={};
    allApprovals.sort((a,b)=>{
      const ta=a.createdAt&&a.createdAt.seconds?a.createdAt.seconds:0;
      const tb=b.createdAt&&b.createdAt.seconds?b.createdAt.seconds:0;
      return ta-tb;
    });
    allApprovals.forEach(a=>{
      if(!idxMap[a.id])idxMap[a.id]=reqIdx++;
    });
    pendingApprovals.forEach(a=>a._reqIdx=idxMap[a.id]||0);
    processedApprovals.forEach(a=>a._reqIdx=idxMap[a.id]||0);
    myRequests.forEach(a=>a._reqIdx=idxMap[a.id]||0);

    document.getElementById('pendingCount').textContent=pendingApprovals.length;

    filterPending();
    filterProcessed();
    renderMyRequests();
  }catch(e){
    console.error('Load approvals error:',e);
    document.getElementById('pendingList').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Error Loading</h3><p>'+escHtml(e.message)+'</p></div>';
  }
}

async function init(){
  await checkSystemAccess('approvals');
  currentUser=requireAuth(['division_head','district_head','area_head']);
  if(!currentUser)return;
  userRole=currentUser.role;
  document.getElementById('sidebarUserName').textContent=currentUser.name||'User';
  document.getElementById('sidebarRole').textContent=userRole.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
  buildSidebar(currentUser);
  buildBottomNav(currentUser);
  await loadAllApprovals();
}

document.addEventListener('DOMContentLoaded',init);

document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',function(e){
    if(e.target===this)this.classList.remove('show');
  });
});
