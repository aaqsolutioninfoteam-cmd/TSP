<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f7fa;color:#1a1a2e;max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:70px}
:root{--primary:#1a6b3c;--dark:#0d4a25;--red:#dc3545;--orange:#ff9800;--success:#28a745;--light:#f5f7fa;--dark-text:#1a1a2e;--gray:#6c757d;--border:#e9ecef;--white:#fff;--radius:14px}

.header{position:sticky;top:0;z-index:100;background:var(--primary);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header .menu-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px}
.header h1{font-size:17px;font-weight:600;flex:1}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;display:flex;border-top:1px solid var(--border);z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;text-decoration:none;color:var(--gray);font-size:10px;gap:2px;transition:color .2s}
.bottom-nav a i{font-size:18px}
.bottom-nav a.active{color:var(--primary);font-weight:600}

.container{padding:16px}

.search-box{position:relative;margin-bottom:14px}
.search-box input{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:#fff;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--primary)}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:14px}

.btn-primary{background:var(--primary);color:#fff;border:none;padding:12px 18px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;width:100%;justify-content:center;transition:background .2s}
.btn-primary:hover{background:var(--dark)}

.stats-row{display:flex;gap:10px;margin-bottom:16px}
.stat-card{flex:1;background:#fff;border-radius:var(--radius);padding:12px 10px;text-align:center;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-card .num{font-size:22px;font-weight:700;color:var(--primary)}
.stat-card .lbl{font-size:11px;color:var(--gray);margin-top:2px}

.desig-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.desig-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.desig-name{font-size:15px;font-weight:700;color:var(--dark-text)}
.desig-code{font-size:11px;color:var(--gray);font-family:monospace;margin-top:2px}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;margin:2px 4px 2px 0}
.badge-division{background:#e8f5e9;color:#1a6b3c}
.badge-district{background:#e3f2fd;color:#1565c0}
.badge-area{background:#fff3e0;color:#e65100}
.badge-zeli{background:#fce4ec;color:#c62828}
.badge-department{background:#f3e5f5;color:#7b1fa2}
.badge-head{background:#e8f5e9;color:#28a745}
.badge-assistant{background:#e3f2fd;color:#1976d2}
.badge-coordinator{background:#fff3e0;color:#ff9800}
.badge-member{background:#f5f5f5;color:#6c757d}
.badge-active{background:#e8f5e9;color:#28a745}
.badge-inactive{background:#ffeef0;color:#dc3545}
.desig-meta{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:8px}
.desig-footer{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.desig-footer .persons{font-size:12px;color:var(--gray)}
.desig-footer .persons i{margin-right:4px}
.desig-actions{display:flex;gap:8px}
.desig-actions button{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;transition:all .2s}
.btn-edit{color:var(--primary)}
.btn-edit:hover{background:rgba(26,107,60,.08)}
.btn-delete{color:var(--red)}
.btn-delete:hover{background:rgba(220,53,69,.08)}

.empty-state{text-align:center;padding:40px 20px;color:var(--gray)}
.empty-state i{font-size:48px;color:var(--border);margin-bottom:12px}
.empty-state p{font-size:14px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;width:100%;max-width:500px;border-radius:var(--radius) var(--radius) 0 0;padding:0;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:1;border-radius:var(--radius) var(--radius) 0 0}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray);padding:4px}
.modal-body{padding:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--dark-text);margin-bottom:6px}
.form-group input,.form-group select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;outline:none;transition:border .2s;background:#fff}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.form-group input:disabled{background:#f5f5f5;color:var(--gray)}
.modal-footer{display:flex;gap:10px;padding:14px 16px;border-top:1px solid var(--border);position:sticky;bottom:0;background:#fff}
.btn-cancel{flex:1;padding:11px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray)}
.btn-save{flex:1;padding:11px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer}

.warning-box{background:#fff3e0;border:1px solid #ffcc80;border-radius:10px;padding:10px 12px;margin-bottom:14px;display:none;font-size:13px;color:#e65100}
.warning-box i{margin-right:6px}

.alert-overlay{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:468px;z-index:400;margin-top:16px}
.alert-overlay.show{display:block;animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.alert-box{padding:12px 16px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.alert-success{background:var(--success)}
.alert-error{background:var(--red)}
.alert-warning{background:var(--orange);color:#1a1a2e}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200}
.sidebar-overlay.active{display:block}
.sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:var(--white);z-index:300;transition:left 0.3s ease;overflow-y:auto;border-radius:0 var(--radius) var(--radius) 0;box-shadow:2px 0 10px rgba(0,0,0,0.1)}
.sidebar.open{left:0}
.sidebar-header{background:var(--primary);color:var(--white);padding:20px 16px;border-radius:0 var(--radius) 0 0}
.sidebar-header h2{font-size:16px;margin-bottom:4px}
.sidebar-header p{font-size:12px;opacity:0.8}
.sidebar-header .role-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:20px;font-size:11px;margin-top:6px;text-transform:capitalize}
.sidebar-menu{padding:10px 0}
.sidebar-menu a{display:flex;align-items:center;gap:12px;padding:12px 20px;color:var(--dark-text);text-decoration:none;font-size:14px;transition:background 0.2s}
.sidebar-menu a:hover,.sidebar-menu a.active{background:var(--light);color:var(--primary);font-weight:600}
.sidebar-menu a.active{border-right:3px solid var(--primary)}
.sidebar-menu a i{width:22px;text-align:center;font-size:16px;flex-shrink:0}
.sidebar-menu .logout-btn{color:var(--red);border-top:1px solid var(--border);margin-top:6px}
</style>
</head>

async function checkSystemAccess(moduleId){
  try{
    const raw=localStorage.getItem('ngoUser');
    if(!raw)return;
    const user=JSON.parse(raw);
    if(user.role==='division_head')return;
    const settingsSnap=await db.collection('settings').limit(1).get();
    if(!settingsSnap.empty){
      const s=settingsSnap.docs[0].data();
      if(s.maintenanceMode){
        document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-tools"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Under Development</h1><p style="font-size:16px;opacity:.7;line-height:1.6">'+(s.maintenanceMessage||'Software under development hai. Please wait karein.')+'</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
        throw new Error('maintenance');
      }
    }
    const accessSnap=await db.collection('user_access').where('userId','==',user.id).limit(1).get();
    if(!accessSnap.empty){
      const a=accessSnap.docs[0].data();
      if(a.expiresAt){
        const exp=a.expiresAt.seconds?new Date(a.expiresAt.seconds*1000):new Date(a.expiresAt);
        if(new Date()>exp){
          document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;font-family:Inter,sans-serif;text-align:center;padding:20px"><div><div style="font-size:64px;margin-bottom:16px"><i class="fas fa-lock"></i></div><h1 style="font-size:24px;font-weight:800;margin-bottom:12px">Access Expired</h1><p style="font-size:16px;opacity:.7">Aapka access khatam ho gaya hai. Admin se contact karein.</p><p style="font-size:12px;opacity:.4;margin-top:24px">A.A.Q. Solutions & Outsourcing</p></div></div>';
          throw new Error('access expired');
        }
      }
      if(a.modules&&a.modules[moduleId]===false){
        window.location.href='dashboard.html';
        throw new Error('no access');
      }
    }
  }catch(e){
    if(e.message==='maintenance'||e.message==='access expired'){}
  }
}

var ALLOWED_ROLES=['division_head'];
var currentUser=null;
var designationsData=[];
var editingId=null;
var nextCode='DES001';

function requireAuth(roles){
  var u=JSON.parse(localStorage.getItem('ngoUser')||'null');
  if(!u||!u.email){window.location.href='index.html';return null}
  if(roles&&roles.indexOf(u.role)===-1){window.location.href='dashboard.html';return null}
  return u;
}

function showAlert(msg,type){
  var o=document.getElementById('alertOverlay');
  var b=document.getElementById('alertBox');
  b.className='alert-box alert-'+type;
  b.innerHTML='<i class="fas fa-'+(type==='success'?'check-circle':type==='error'?'times-circle':'exclamation-triangle')+'"></i> '+msg;
  o.classList.add('show');
  setTimeout(function(){o.classList.remove('show')},3000);
}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open')}

function openModal(){document.getElementById('modalOverlay').classList.add('open')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');resetForm()}

function resetForm(){
  document.getElementById('desigName').value='';
  document.getElementById('desigCode').value='';
  document.getElementById('desigLevel').value='';
  document.getElementById('desigType').value='';
  document.getElementById('desigStatus').value='Active';
  document.getElementById('warningBox').style.display='none';
  editingId=null;
  document.getElementById('modalTitle').textContent='Naya Designation';
  document.getElementById('saveBtn').textContent='Save';
}

function generateCode(){
  var max=0;
  designationsData.forEach(function(d){
    if(d.code){
      var num=parseInt(d.code.replace('DES',''));
      if(num>max)max=num;
    }
  });
  var next=max+1;
  nextCode='DES'+(next<10?'00':next<100?'0':'')+next;
  document.getElementById('desigCode').value=nextCode;
}

function getLevelBadgeClass(level){
  var m={'Division':'badge-division','District':'badge-district','Area':'badge-area','Zeli Halqa':'badge-zeli','Department':'badge-department'};
  return m[level]||'badge-member';
}

function getTypeBadgeClass(type){
  var m={'Head':'badge-head','Assistant Head':'badge-assistant','Coordinator':'badge-coordinator','Member':'badge-member'};
  return m[type]||'badge-member';
}

function getStatusBadgeClass(s){
  return s==='Active'?'badge-active':'badge-inactive';
}

function renderDesignations(filter){
  var f=(filter||'').toLowerCase();
  var filtered=designationsData.filter(function(d){
    return !f||d.name.toLowerCase().indexOf(f)!==-1||d.code.toLowerCase().indexOf(f)!==-1||d.level.toLowerCase().indexOf(f)!==-1||d.type.toLowerCase().indexOf(f)!==-1;
  });

  var total=designationsData.length;
  var active=designationsData.filter(function(d){return d.status==='Active'}).length;
  var inactive=total-active;
  document.getElementById('totalCount').textContent=total;
  document.getElementById('activeCount').textContent=active;
  document.getElementById('inactiveCount').textContent=inactive;

  var c=document.getElementById('designationList');
  if(filtered.length===0){
    c.innerHTML='<div class="empty-state"><i class="fas fa-id-badge"></i><p>'+(f?'Search results nahi mile':'Koi designation nahi hai')+'</p></div>';
    return;
  }

  var html='';
  filtered.forEach(function(d){
    var personsCount=d.personsCount||0;
    html+='<div class="desig-card">';
    html+='<div class="desig-top"><div><div class="desig-name">'+escHtml(d.name)+'</div><div class="desig-code">'+escHtml(d.code)+'</div></div></div>';
    html+='<div class="desig-meta">';
    html+='<span class="badge '+getLevelBadgeClass(d.level)+'">'+escHtml(d.level)+'</span>';
    html+='<span class="badge '+getTypeBadgeClass(d.type)+'">'+escHtml(d.type)+'</span>';
    html+='<span class="badge '+getStatusBadgeClass(d.status)+'">'+escHtml(d.status)+'</span>';
    html+='</div>';
    html+='<div class="desig-footer">';
    html+='<div class="persons"><i class="fas fa-user-tie"></i>'+personsCount+' person(s) assigned</div>';
    html+='<div class="desig-actions">';
    html+='<button class="btn-edit" onclick="editDesig(\''+d.id+'\')"><i class="fas fa-edit"></i> Edit</button>';
    html+='<button class="btn-delete" onclick="deleteDesig(\''+d.id+'\')"><i class="fas fa-trash"></i> Delete</button>';
    html+='</div></div></div>';
  });
  c.innerHTML=html;
}

function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

function loadDesignations(){
  db.collection('designations').orderBy('createdAt','desc').get().then(function(snap){
    designationsData=[];
    var promises=[];
    snap.forEach(function(doc){
      var d=doc.data();d.id=doc.id;d.personsCount=0;
      designationsData.push(d);
    });
    var batchPromises=designationsData.map(function(d){
      return db.collection('persons').where('designationId','==',d.id).get().then(function(ps){
        d.personsCount=ps.size;
      }).catch(function(){d.personsCount=0});
    });
    Promise.all(batchPromises).then(function(){
      renderDesignations(document.getElementById('searchInput').value);
    });
  }).catch(function(e){
    console.error(e);
    showAlert('Data load nahi ho paya','error');
  });
}

function checkHeadDuplicate(level,type){
  if(type!=='Head')return null;
  var existing=null;
  designationsData.forEach(function(d){
    if(d.level===level&&d.type==='Head'&&d.id!==editingId)existing=d;
  });
  return existing;
}

function editDesig(id){
  var d=designationsData.find(function(x){return x.id===id});
  if(!d)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Designation Edit Karein';
  document.getElementById('saveBtn').textContent='Update';
  document.getElementById('desigName').value=d.name;
  document.getElementById('desigCode').value=d.code;
  document.getElementById('desigLevel').value=d.level;
  document.getElementById('desigType').value=d.type;
  document.getElementById('desigStatus').value=d.status;
  document.getElementById('warningBox').style.display='none';
  openModal();
}

function deleteDesig(id){
  if(!confirm('Kya aap is designation ko delete karna chahte hain?'))return;
  db.collection('designations').doc(id).delete().then(function(){
    showAlert('Designation delete ho gaya','success');
    loadDesignations();
  }).catch(function(e){
    console.error(e);
    showAlert('Delete nahi ho paya','error');
  });
}

function saveDesig(){
  var name=document.getElementById('desigName').value.trim();
  var level=document.getElementById('desigLevel').value;
  var type=document.getElementById('desigType').value;
  var status=document.getElementById('desigStatus').value;
  var code=editingId?document.getElementById('desigCode').value:nextCode;

  if(!name){showAlert('Designation name darj karein','error');return}
  if(!level){showAlert('Level select karein','error');return}
  if(!type){showAlert('Type select karein','error');return}

  var dup=checkHeadDuplicate(level,type);
  if(dup){
    var w=document.getElementById('warningBox');
    document.getElementById('warningText').textContent=level+' level pe pehle se ek "Head" designation hai: '+dup.name+'. Phir bhi create karna hai?';
    w.style.display='block';
  }

  var data={name:name,code:code,level:level,type:type,status:status,createdAt:editingId?undefined:firebase.firestore.FieldValue.serverTimestamp()};

  if(editingId){
    data.updatedAt=firebase.firestore.FieldValue.serverTimestamp();
    db.collection('designations').doc(editingId).update(data).then(function(){
      showAlert('Designation update ho gaya','success');
      closeModal();loadDesignations();
    }).catch(function(e){console.error(e);showAlert('Update nahi ho paya','error')});
  }else{
    db.collection('designations').add(data).then(function(){
      showAlert('Designation ban gaya','success');
      closeModal();loadDesignations();
    }).catch(function(e){console.error(e);showAlert('Create nahi ho paya','error')});
  }
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}
function buildSidebar(user){
  const nameEl=document.getElementById('sidebarName');
  const phoneEl=document.getElementById('sidebarPhone');
  const roleEl=document.getElementById('sidebarRole');
  const avatarEl=document.getElementById('avatarEl');
  if(nameEl)nameEl.textContent=user.name;
  if(phoneEl)phoneEl.textContent=user.phone||'-';
  if(roleEl)roleEl.textContent=user.role.replace(/_/g,' ');
  if(avatarEl)avatarEl.textContent=user.name.charAt(0).toUpperCase();
  const menu=menus[user.role]||[];
  const cont=document.getElementById('sidebarMenu');
  if(!cont)return;
  cont.innerHTML='';
  menu.forEach(m=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+m.icon+'"></i> '+m.label;
    if(m.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      closeSidebar();
      if(m.file==='logout'){localStorage.removeItem('ngoUser');window.location.href='index.html';return}
      if(m.file!=='dashboard.html')window.location.href=m.file;
    };
    if(m.icon==='fa-sign-out-alt')a.classList.add('logout-btn');
    cont.appendChild(a);
  });
}
function buildBottomNav(user){
  const nav=document.getElementById('bottomNav');
  if(!nav)return;
  nav.innerHTML='';
  const items=bottomNavs[user.role]||[];
  items.forEach(b=>{
    const a=document.createElement('a');
    a.href='#';
    a.innerHTML='<i class="fas '+b.icon+'"></i><span>'+b.label+'</span>';
    if(b.active)a.classList.add('active');
    a.onclick=function(e){
      e.preventDefault();
      if(b.file==='sidebar'){toggleSidebar();return}
      if(b.file!=='dashboard.html')window.location.href=b.file;
    };
    nav.appendChild(a);
  });
}
</script>
